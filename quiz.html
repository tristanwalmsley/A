<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Besties ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Caveat:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#faf4e8;--warm:#f0ddb8;--tan:#d4b483;--brown:#7a5230;--deep:#3a2010;--rose:#b86858;--gold:#c8943a;--sage:#7a9870;--paper:#fffdf5;--ink:#2a1a08}
body{background:var(--cream);font-family:'EB Garamond',Georgia,serif;color:var(--ink);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.6}
nav{padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--tan);background:var(--paper);position:sticky;top:0;z-index:500}
.nav-brand{font-family:'Caveat',cursive;font-size:1.3rem;color:var(--rose);font-weight:700;text-decoration:none}
.nav-links{display:flex;gap:1.2rem;flex-wrap:wrap}
.nav-a{font-family:'Caveat',cursive;font-size:1rem;color:var(--brown);text-decoration:none;padding:0.3rem 0.7rem;border-radius:2px;transition:color 0.2s,background 0.2s}
.nav-a:hover{color:var(--deep);background:var(--warm)}
.nav-a.current{color:var(--deep);font-weight:700;border-bottom:2px solid var(--gold)}
.page-header{text-align:center;padding:3rem 2rem 1rem}
.page-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:400;font-style:italic;color:var(--deep)}
.page-header p{font-family:'Caveat',cursive;font-size:1.1rem;color:var(--brown);margin-top:0.4rem;letter-spacing:0.5px}
/* QUIZ */
.quiz-wrap{max-width:560px;margin:2rem auto 5rem;padding:0 1.5rem}
.progress-rail{height:4px;background:var(--warm);border-radius:999px;overflow:hidden;margin-bottom:0.4rem}
.progress-fill{height:100%;background:var(--gold);border-radius:999px;transition:width 0.5s cubic-bezier(0.34,1.4,0.64,1)}
.progress-label{font-family:'Caveat',cursive;font-size:0.95rem;color:var(--brown);text-align:right;margin-bottom:0.2rem}
.round-label{font-family:'Caveat',cursive;font-size:0.82rem;letter-spacing:2px;text-transform:uppercase;color:var(--rose);text-align:right;margin-bottom:1.3rem}
/* ROUND INTRO CARD */
.round-card{background:var(--deep);color:var(--cream);padding:3rem 2rem;text-align:center;box-shadow:5px 5px 0 var(--rose);animation:qIn 0.5s cubic-bezier(0.22,1,0.36,1)}
.round-eyebrow{font-family:'Caveat',cursive;font-size:0.85rem;letter-spacing:3px;text-transform:uppercase;color:var(--tan);margin-bottom:0.6rem}
.round-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-style:italic;color:var(--gold);margin-bottom:0.8rem}
.round-desc{font-family:'Caveat',cursive;font-size:1.05rem;color:rgba(250,244,232,0.75);margin-bottom:1.8rem;line-height:1.6}
.btn-round-start{background:var(--gold);color:var(--deep);border:none;padding:0.75rem 2rem;font-family:'Caveat',cursive;font-size:1.15rem;cursor:pointer;box-shadow:3px 3px 0 var(--rose);transition:all 0.15s;letter-spacing:0.5px}
.btn-round-start:hover{background:#e0a840;transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--rose)}
/* QUESTION CARD */
.q-card{background:var(--paper);border:1px solid var(--tan);padding:2rem 2rem 1.8rem;box-shadow:5px 5px 0 var(--warm);animation:qIn 0.5s cubic-bezier(0.22,1,0.36,1)}
@keyframes qIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.q-number{font-family:'Caveat',cursive;font-size:0.8rem;letter-spacing:3px;text-transform:uppercase;color:var(--rose);margin-bottom:0.5rem}
.q-text{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:400;color:var(--deep);line-height:1.4;margin-bottom:1.5rem}
.q-options{display:flex;flex-direction:column;gap:0.5rem}
.q-opt{background:transparent;border:1.5px solid var(--tan);padding:0.7rem 1.1rem;text-align:left;font-family:'Caveat',cursive;font-size:1.05rem;color:var(--brown);cursor:pointer;transition:all 0.15s;position:relative;letter-spacing:0.3px}
.q-opt:hover{background:var(--warm);border-color:var(--gold);color:var(--deep)}
.q-opt.selected{background:var(--warm);border-color:var(--gold);color:var(--deep)}
.q-opt.correct{background:#d4eecc;border-color:var(--sage);color:#2a4a20}
.q-opt.wrong{background:#f0d0cc;border-color:var(--rose);color:#5a2018}
.q-opt.reveal-correct{background:#d4eecc;border-color:var(--sage);color:#2a4a20}
.q-opt:disabled{cursor:default}
.q-tf-row{display:flex;gap:0.7rem}
.q-tf-row .q-opt{flex:1;text-align:center}
.q-text-row{display:flex;gap:0.6rem;flex-wrap:wrap}
.q-text-input{flex:1;min-width:180px;background:var(--cream);border:1.5px solid var(--tan);padding:0.65rem 0.9rem;font-family:'EB Garamond',Georgia,serif;font-size:1rem;color:var(--ink);outline:none}
.q-text-input:focus{border-color:var(--gold)}
.btn-submit-text{background:var(--deep);color:var(--cream);border:none;padding:0.65rem 1.4rem;font-family:'Caveat',cursive;font-size:1.05rem;cursor:pointer;box-shadow:3px 3px 0 var(--brown);transition:all 0.15s}
.btn-submit-text:hover{background:var(--brown);transform:translate(-2px,-2px);box-shadow:5px 5px 0 #5a3820}
.reveal-wrap{margin-top:1.2rem;padding:0.9rem 1.1rem;background:var(--cream);border-left:4px solid var(--gold);display:none}
.reveal-wrap.show{display:block;animation:qIn 0.4s ease}
.reveal-verdict{font-family:'Caveat',cursive;font-size:1rem;font-weight:700;margin-bottom:0.4rem;letter-spacing:0.3px}
.reveal-verdict.is-correct{color:var(--sage)}
.reveal-verdict.is-wrong{color:var(--rose)}
.reveal-text{font-size:0.97rem;line-height:1.7;color:var(--deep);font-style:italic}
.btn-next{margin-top:1.2rem;background:var(--deep);color:var(--cream);border:none;padding:0.6rem 1.8rem;font-family:'Caveat',cursive;font-size:1.1rem;cursor:pointer;box-shadow:3px 3px 0 var(--brown);transition:all 0.15s;display:none}
.btn-next.show{display:inline-block}
.btn-next:hover{background:var(--brown);transform:translate(-2px,-2px);box-shadow:5px 5px 0 #5a3820}
/* RESULTS */
.results-wrap{text-align:center;display:none;animation:qIn 0.6s ease}
.results-wrap.show{display:block}
.score-big{font-family:'Playfair Display',serif;font-size:5rem;font-weight:700;color:var(--gold);line-height:1;margin-bottom:0.3rem}
.score-label{font-family:'Caveat',cursive;font-size:1.2rem;color:var(--brown);letter-spacing:1px;margin-bottom:1.5rem}
.verdict{background:var(--paper);border:1px solid var(--tan);padding:1.5rem 2rem;box-shadow:5px 5px 0 var(--warm);text-align:left;margin-bottom:1.5rem}
.verdict-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-style:italic;color:var(--deep);margin-bottom:0.5rem}
.verdict-text{font-size:1rem;line-height:1.8;color:var(--brown)}
.round-breakdown{background:var(--paper);border:1px solid var(--tan);padding:1.2rem 1.6rem;text-align:left;margin-bottom:1.5rem;box-shadow:3px 3px 0 var(--warm)}
.round-breakdown h3{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--deep);margin-bottom:0.7rem}
.rb-row{display:flex;justify-content:space-between;font-size:0.92rem;color:var(--brown);padding:0.3rem 0;border-bottom:1px dashed var(--warm)}
.rb-row:last-child{border-bottom:none}
.rb-score{font-family:'Caveat',cursive;font-weight:700;color:var(--rose)}
.btn-replay{background:var(--rose);color:var(--cream);border:none;padding:0.7rem 2rem;font-family:'Caveat',cursive;font-size:1.1rem;cursor:pointer;box-shadow:3px 3px 0 #8a4838;letter-spacing:0.5px;transition:all 0.15s}
.btn-replay:hover{background:#c8605a;transform:translate(-2px,-2px);box-shadow:5px 5px 0 #8a4838}
</style>
</head>
<body>
<nav id="site-nav">
  <a href="index.html" class="nav-brand">Besties ♡</a>
  <div class="nav-links"></div>
</nav>
<div class="page-header">
  <h1>How well do you know your bestie?</h1>
  <p>an official examination. four rounds. there will be marks.</p>
</div>

<div class="quiz-wrap">
  <div id="quiz-content">
    <div class="progress-rail"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="round-label" id="round-label">Round 1 of 4 — The Basics</div>
    <div class="progress-label" id="prog-label">Question 1 of 28</div>
    <div id="q-container"></div>
  </div>
  <div class="results-wrap" id="results"></div>
</div>

<script>
// ═══════════════════════════════════════════
// QUESTION BANK — organised into rounds
// Types: 'mcq' (default, multiple choice), 'tf' (true/false), 'text' (free response)
// Items marked with placeholder text are ready for real answers to be dropped in —
// search for [ ] to find every spot that still needs filling in.
// ═══════════════════════════════════════════
const ROUNDS = [
  {
    name: 'The Basics',
    desc: 'Warm-up round. If you get these wrong we need to have a much bigger conversation.',
    questions: [
      {
        q: 'Where in England does Tristan live?',
        opts: ['London','Portsmouth','Manchester','Brighton'],
        correct: 1,
        reveal: 'Portsmouth — on the south coast of England, which is why so many things cross the English Channel and North Sea to get to you.'
      },
      {
        q: 'How many years have Tristan and Ann been friends?',
        opts: ['1 year','2 years','Over 3 years','5 years'],
        correct: 2,
        reveal: 'Over three years — starting in January 2023. The kind of friendship that feels like it\'s always been there.'
      },
      {
        q: 'Where does Ann live?',
        opts: ['[option A]','[option B]','[option C]','[option D]'],
        correct: 0,
        reveal: '[write reveal text here]'
      },
      {
        q: 'How did Tristan and Ann first become friends?',
        opts: ['[option A]','[option B]','[option C]','[option D]'],
        correct: 0,
        reveal: '[write reveal text here]'
      },
      {
        q: 'What does Ann do — job, studies, or otherwise?',
        opts: ['[option A]','[option B]','[option C]','[option D]'],
        correct: 0,
        reveal: '[write reveal text here]'
      },
    ]
  },
  {
    name: "This Year's Box",
    desc: 'Everything currently sitting in front of you. Pay attention — you\'ve had clues all along.',
    questions: [
      {
        q: 'What was the very first proper gift Tristan sent Ann?',
        opts: ['A biscuit tin','A letter and postcards','A Christmas parcel','A birthday card and video'],
        correct: 3,
        reveal: 'Year one birthday — a card, a funny video, a quiz, and the first "Bestie Year Contract". That quiz started a tradition.'
      },
      {
        q: 'Which biscuit has Tristan sent in four different flavours this year?',
        opts: ['Digestive','Rich Tea','Custard Cream','Hobnob'],
        correct: 2,
        reveal: 'The custard cream — sent in coconut, lemon, strawberry, and digestive flavours this year, plus two bonus biscuit packs (NICE and Malted Milk) for good measure.'
      },
      {
        q: 'What\'s inside the Heinz Beans can in this year\'s box?',
        opts: ['Beans','A letter','The plushie','Stickers'],
        correct: 2,
        reveal: 'The plushie! Packed inside a real Heinz Beans can — because of the "beans meanz Heinz" joke and because it\'s objectively hilarious.'
      },
      {
        q: 'How long has Tristan been learning Dutch by the time this box arrives?',
        opts: ['1 month','2 months','4 months','6 months'],
        correct: 2,
        reveal: 'Four months! Which is genuinely quite a lot of effort and should be acknowledged accordingly.'
      },
      {
        q: 'What artist made the custom illustrated postcards and packaging Tristan included this year?',
        opts: ['SnailPost Studio','MogSweep','PostmarkPress','NorthSeaArt'],
        correct: 1,
        reveal: 'MogSweep on Etsy — last year\'s packaging was incredible (custom envelope, handwritten letter, free postcard, free stickers), so of course Tristan went back.'
      },
      {
        q: 'How many years have Tristan and Ann been friends, according to the WWI postcards\' envelopes?',
        opts: ['They\'re just wrapped, no theme','Aeroplane stickers','Wax seals','Newspaper'],
        correct: 1,
        reveal: 'Each of the four WWI postcards is individually wrapped in its own decorated envelope. Obviously.'
      },
      {
        q: 'What will happen to the plushie every six months, forever?',
        opts: ['It stays at Ann\'s forever','It travels between them twice a year','It gets mailed to a new friend','It retires after one trip'],
        correct: 1,
        reveal: 'It\'s a new tradition — the plushie travels between them twice a year, collecting stamps in its very own passport, indefinitely.'
      },
      {
        q: 'What does the outside of the box look like?',
        opts: ['Plain brown packaging','Decorated with drawings of their whole story','Covered in stickers only','A map of the North Sea'],
        correct: 1,
        reveal: 'The box itself is a gift — Tristan decorated the entire outside with their whole story. Because of course.'
      },
      {
        q: 'How many Lancashire postcards came in this year\'s box?',
        opts: ['2','3','4','5'],
        correct: 2,
        reveal: 'Four! All four in one plastic wallet together, with a little yellow information card giving the details.'
      },
      {
        q: 'Besides a postcard, what else was tucked inside the very fancy MogSweep box?',
        opts: ['Stickers and washi tape','A second letter and a photo','Nothing — just the postcard','A biscuit'],
        correct: 0,
        reveal: 'Snail mail stickers and pigeon post washi tape — and Tristan hadn\'t even checked they were actually in there before sending it.'
      },
      {
        q: 'What\'s the one gift that got added in after everything else was already planned?',
        opts: ['A friendship bracelet','A second plushie','A third sticker pack','A puzzle'],
        correct: 0,
        reveal: 'A handmade friendship bracelet — squeezed in as an extra stop partway through.'
      },
      {
        q: 'How many total stops are there in this year\'s gift-opening journey?',
        opts: ['18','25','32','38'],
        correct: 3,
        reveal: '38! Up from 18 last year — this year got a little out of hand, in the best way.'
      },
    ]
  },
  {
    name: 'Our History (Deep Cuts)',
    desc: 'The stuff only the two of you would know. No pressure.',
    questions: [
      {
        q: 'What was the first thing Tristan and Ann really bonded over?',
        opts: ['[option A]','[option B]','[option C]','[option D]'],
        correct: 0,
        reveal: '[write reveal text here]'
      },
      {
        q: 'What\'s the name (or subject) of your longest-running inside joke?',
        opts: ['[option A]','[option B]','[option C]','[option D]'],
        correct: 0,
        reveal: '[write reveal text here]'
      },
      {
        q: 'Where do you both most want to travel to together one day?',
        opts: ['[option A]','[option B]','[option C]','[option D]'],
        correct: 0,
        reveal: '[write reveal text here]'
      },
      {
        q: 'What\'s a running bit between you two that would make zero sense to anyone else?',
        opts: ['[option A]','[option B]','[option C]','[option D]'],
        correct: 0,
        reveal: '[write reveal text here]'
      },
      {
        q: 'What\'s been the single most memorable call the two of you have ever had?',
        opts: ['[option A]','[option B]','[option C]','[option D]'],
        correct: 0,
        reveal: '[write reveal text here]'
      },
      {
        q: 'In one word: what does Ann send the most when texting Tristan?',
        type: 'text',
        accepted: ['[accepted answer 1]','[accepted answer 2]'],
        reveal: '[write reveal text here]'
      },
    ]
  },
  {
    name: 'Just For Fun',
    desc: 'Lower stakes. Higher chaos. Mixed formats, because you\'ve earned some variety by now.',
    questions: [
      {
        q: 'True or false: Tristan definitely did not eat any of Ann\'s biscuits before sending them.',
        type: 'tf',
        correct: 1,
        reveal: '[decide the real answer and write the reveal here — this one is a joke either way]'
      },
      {
        q: 'In one word, describe this friendship.',
        type: 'text',
        accepted: ['[accepted answer 1]','[accepted answer 2]','[accepted answer 3]'],
        reveal: '[write reveal text here]'
      },
      {
        q: 'If this friendship were a biscuit, which would it be?',
        opts: ['[option A]','[option B]','[option C]','[option D]'],
        correct: 0,
        reveal: '[write reveal text here — and feel free to make this one properly silly]'
      },
      {
        q: 'Which of these has Tristan definitely said, completely unironically, on a call?',
        opts: ['[option A]','[option B]','[option C]','[option D]'],
        correct: 0,
        reveal: '[write reveal text here]'
      },
      {
        q: 'True or false: there will be a bigger, even more unhinged quiz next year.',
        type: 'tf',
        correct: 0,
        reveal: 'Obviously true. This is a tradition now, and traditions only ever get more elaborate here.'
      },
    ]
  },
];

// Flatten rounds into a single question list, tagging each with its round info
const QUESTIONS = [];
ROUNDS.forEach((round, ri) => {
  round.questions.forEach((q, qi) => {
    QUESTIONS.push({ ...q, roundIndex: ri, roundName: round.name, roundDesc: round.desc, isFirstInRound: qi === 0 });
  });
});

let current = 0;
let score = 0;
let answered = false;
const seenRoundIntros = new Set();

function updateProgress() {
  const pct = (current / QUESTIONS.length) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  const q = QUESTIONS[current];
  document.getElementById('round-label').textContent = `Round ${q.roundIndex+1} of ${ROUNDS.length} — ${q.roundName}`;
  document.getElementById('prog-label').textContent = `Question ${current+1} of ${QUESTIONS.length}`;
}

function renderQuestion() {
  const q = QUESTIONS[current];
  updateProgress();

  if (q.isFirstInRound && !seenRoundIntros.has(q.roundIndex)) {
    renderRoundIntro(q);
    return;
  }
  renderActualQuestion(q);
}

function renderRoundIntro(q) {
  const container = document.getElementById('q-container');
  container.innerHTML = `
    <div class="round-card">
      <div class="round-eyebrow">Round ${q.roundIndex+1} of ${ROUNDS.length}</div>
      <div class="round-title">${q.roundName}</div>
      <p class="round-desc">${q.roundDesc}</p>
      <button class="btn-round-start" onclick="beginRound(${q.roundIndex})">Begin round →</button>
    </div>
  `;
}

function beginRound(roundIndex) {
  seenRoundIntros.add(roundIndex);
  renderActualQuestion(QUESTIONS[current]);
}

function renderActualQuestion(q) {
  const container = document.getElementById('q-container');
  container.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'q-card';

  let bodyHTML;
  if (q.type === 'tf') {
    bodyHTML = `
      <div class="q-tf-row" id="q-opts">
        <button class="q-opt" onclick="answer(0)">True</button>
        <button class="q-opt" onclick="answer(1)">False</button>
      </div>`;
  } else if (q.type === 'text') {
    bodyHTML = `
      <div class="q-text-row">
        <input type="text" class="q-text-input" id="q-text-input" placeholder="Type your answer..." autocomplete="off">
        <button class="btn-submit-text" onclick="submitText()">Submit</button>
      </div>`;
  } else {
    bodyHTML = `
      <div class="q-options" id="q-opts">
        ${q.opts.map((o,i)=>`<button class="q-opt" onclick="answer(${i})">${o}</button>`).join('')}
      </div>`;
  }

  card.innerHTML = `
    <div class="q-number">Question ${current+1}</div>
    <div class="q-text">${q.q}</div>
    ${bodyHTML}
    <div class="reveal-wrap" id="reveal">
      <div class="reveal-verdict" id="reveal-verdict"></div>
      <p class="reveal-text">${q.reveal}</p>
    </div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">${current < QUESTIONS.length - 1 ? 'Next question →' : 'See my score →'}</button>
  `;
  container.appendChild(card);
  answered = false;

  if (q.type === 'text') {
    const input = document.getElementById('q-text-input');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submitText(); });
    input.focus();
  }
}

function answer(idx) {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[current];
  const opts = document.querySelectorAll('#q-opts .q-opt');
  const isCorrect = idx === q.correct;
  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('reveal-correct');
    if (i === idx && !isCorrect) btn.classList.add('wrong');
  });
  if (isCorrect) {
    score++;
    opts[idx].classList.remove('reveal-correct');
    opts[idx].classList.add('correct');
  }
  showReveal(isCorrect);
}

function submitText() {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[current];
  const input = document.getElementById('q-text-input');
  const val = (input.value || '').trim().toLowerCase();
  input.disabled = true;
  document.querySelector('.btn-submit-text').disabled = true;
  const accepted = (q.accepted || []).map(a => a.toLowerCase().trim());
  const isCorrect = accepted.length > 0 && accepted.includes(val);
  if (isCorrect) score++;
  showReveal(isCorrect, true);
}

function showReveal(isCorrect, isFreeText) {
  const verdict = document.getElementById('reveal-verdict');
  if (isFreeText) {
    verdict.textContent = isCorrect ? '✓ Matched!' : '✦ Logged — see below';
    verdict.className = 'reveal-verdict ' + (isCorrect ? 'is-correct' : '');
  } else {
    verdict.textContent = isCorrect ? '✓ Correct!' : '✗ Not quite';
    verdict.className = 'reveal-verdict ' + (isCorrect ? 'is-correct' : 'is-wrong');
  }
  document.getElementById('reveal').classList.add('show');
  document.getElementById('btn-next').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current >= QUESTIONS.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  document.getElementById('quiz-content').style.display = 'none';
  const pct = Math.round((score / QUESTIONS.length) * 100);
  let title, text;
  if (pct === 100) {
    title = 'Perfect score. 100%.';
    text = 'You got every single one right, across all four rounds. This friendship has made you very knowledgeable about Tristan. Or you were just very lucky. Either way — flawless. Bestie status: confirmed beyond all reasonable doubt.';
  } else if (pct >= 80) {
    title = 'Extremely good.';
    text = `${score} out of ${QUESTIONS.length}. You know your bestie very well. The ones you missed — we'll chalk those up to nerves. You clearly pay attention. This is noted.`;
  } else if (pct >= 60) {
    title = 'Solid effort.';
    text = `${score} out of ${QUESTIONS.length}. You know the big important things. The gaps are minor. We've been paying attention, mostly. Good job. There may be a refresher quiz at Christmas.`;
  } else if (pct >= 40) {
    title = 'Room for improvement.';
    text = `${score} out of ${QUESTIONS.length}. Okay, so. We have some reading to do. More calls needed. More listening required. More paying attention to Tristan's extensive ramblings about biscuits. But you sat through all four rounds, and that counts.`;
  } else {
    title = 'We need to talk.';
    text = `${score} out of ${QUESTIONS.length}. This is fine. This is completely fine. Okay it's maybe a little bit shocking, especially given how long this quiz was. But you have this website now, and a very decorated box to remind you of things. The next quiz will go better.`;
  }

  const roundBreakdown = ROUNDS.map((round, ri) => {
    const roundQs = QUESTIONS.filter(q => q.roundIndex === ri);
    // We don't track per-round score separately during play, so recompute isn't possible post-hoc for exact right/wrong;
    // instead just show how many questions were in each round for a clean summary.
    return { name: round.name, count: roundQs.length };
  });

  const res = document.getElementById('results');
  res.innerHTML = `
    <div class="score-big">${score}/${QUESTIONS.length}</div>
    <div class="score-label">${pct}% — ${pct===100?'absolutely flawless':pct>=80?'impressively good':pct>=60?'pretty solid':pct>=40?'somewhat concerning':'...oh'}</div>
    <div class="verdict">
      <div class="verdict-title">${title}</div>
      <p class="verdict-text">${text}</p>
    </div>
    <div class="round-breakdown">
      <h3>Rounds completed</h3>
      ${roundBreakdown.map(r => `<div class="rb-row"><span>${r.name}</span><span class="rb-score">${r.count} questions</span></div>`).join('')}
    </div>
    <button class="btn-replay" onclick="restartQuiz()">Take it again →</button>
  `;
  res.classList.add('show');
}

function restartQuiz() {
  current = 0; score = 0;
  seenRoundIntros.clear();
  document.getElementById('results').classList.remove('show');
  document.getElementById('quiz-content').style.display = 'block';
  renderQuestion();
}

renderQuestion();
</script>
<script src="nav.js"></script>
<script>window.addEventListener('DOMContentLoaded',()=>buildNav('quiz.html'));</script>
