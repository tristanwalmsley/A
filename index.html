<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Besties ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Caveat:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#faf4e8;--warm:#f0ddb8;--tan:#d4b483;--brown:#7a5230;--deep:#3a2010;--rose:#b86858;--gold:#c8943a;--sage:#7a9870;--paper:#fffdf5;--ink:#2a1a08}
html,body{height:100%}
body{background:radial-gradient(ellipse at 50% 38%, #fffaf0 0%, var(--cream) 65%);font-family:'EB Garamond',Georgia,serif;color:var(--ink);min-height:100vh;overflow-x:hidden;display:flex;align-items:center;justify-content:center;padding:2rem}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.6}

.glow-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:15}
.glow-blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:0.3;animation:blobDrift ease-in-out infinite alternate}
@keyframes blobDrift{from{transform:translate(0,0) scale(1)}to{transform:translate(var(--bx),var(--by)) scale(1.18)}}

.sparkle-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:15}
.sparkle{position:absolute;border-radius:50%;background:var(--gold);opacity:0;animation:sparkleFloat ease-in-out infinite}
@keyframes sparkleFloat{0%,100%{opacity:0;transform:translateY(0) scale(0.6)}50%{opacity:var(--sop);transform:translateY(-18px) scale(1)}}

.drift-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:15}
.drift{position:absolute;bottom:-5%;opacity:0;line-height:1;animation:driftUp linear infinite;will-change:transform,opacity}
@keyframes driftUp{
  0%{transform:translate(0,0) rotate(0deg);opacity:0}
  8%{opacity:var(--dop,0.5)}
  92%{opacity:var(--dop,0.5)}
  100%{transform:translate(var(--dx,20px),-115vh) rotate(var(--drot,20deg));opacity:0}
}

.wrap{position:relative;z-index:30;text-align:center;max-width:520px;animation:wrapIn 1s ease both}
@keyframes wrapIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.brand{font-family:'Caveat',cursive;font-size:1.4rem;color:var(--rose);font-weight:700;letter-spacing:0.5px;margin-bottom:2.2rem}
.lead{font-family:'Caveat',cursive;font-size:1.2rem;color:var(--brown);letter-spacing:0.5px;margin-bottom:2.5rem}

.timer{display:flex;justify-content:center;gap:0.8rem;flex-wrap:wrap;margin-bottom:2.6rem;transition:opacity 0.5s ease,transform 0.5s ease}
body.stage-10 .timer{opacity:0;transform:scale(0.85);pointer-events:none}
.timer-unit{background:var(--paper);border:1.5px solid var(--tan);box-shadow:4px 4px 0 var(--warm);padding:1.1rem 0.5rem 0.9rem;min-width:78px}
.timer-num{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:700;color:var(--deep);line-height:1;transition:transform 0.25s ease}
.timer-num.tick{animation:numTick 0.4s ease}
@keyframes numTick{0%{transform:translateY(-8px);opacity:0.4}100%{transform:translateY(0);opacity:1}}
.timer-label{font-family:'Caveat',cursive;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;color:var(--rose);margin-top:0.3rem}

/* ---------- ENTRY GATE ----------
   one tap here is what unlocks autoplay-with-sound later on, since browsers
   require a real user gesture somewhere on the page before that's allowed */
#entry-gate{position:fixed;inset:0;z-index:10000;background:radial-gradient(ellipse at 50% 40%,#241008 0%,#140a04 70%);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity 0.9s ease}
#entry-gate.hide{opacity:0;pointer-events:none}
.entry-card{text-align:center}
.entry-title{font-family:'Caveat',cursive;font-size:2.1rem;color:var(--gold);margin-bottom:0.6rem}
.entry-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--warm);opacity:0.75;animation:entryPulse 1.8s ease-in-out infinite}
@keyframes entryPulse{0%,100%{opacity:0.4}50%{opacity:0.9}}

/* ---------- STAGED BUILD-UP: 65s zoom / 60s / 30s / 15s / 10s / 5s ---------- */
body.mega-zoom .wrap{transform:scale(1.6);transition:transform 5s cubic-bezier(0.22,1,0.36,1)}
body.stage-60 .timer-unit{border-color:var(--gold);box-shadow:4px 4px 0 var(--gold)}
body.stage-30 .timer-unit{border-color:var(--rose);box-shadow:5px 5px 0 var(--rose);animation:unitPulse 1.1s ease-in-out infinite}
body.stage-15 .timer-unit{animation:unitPulse 0.7s ease-in-out infinite;box-shadow:6px 6px 0 var(--rose)}
body.stage-15 .brand,body.stage-15 .lead{color:var(--rose);transition:color 0.5s ease}
body.stage-10 .timer-unit{animation:unitPulse 0.45s ease-in-out infinite}
body.stage-5 .wrap{animation:wrapShake 0.3s ease-in-out infinite}
@keyframes unitPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes wrapShake{0%,100%{transform:scale(1.6) translate(0,0)}25%{transform:scale(1.6) translate(-4px,2px)}50%{transform:scale(1.6) translate(4px,-2px)}75%{transform:scale(1.6) translate(-3px,3px)}}

/* the page's actual background layer - always fully visible (no opacity fade),
   with its OWN color driven by JS every tick via HSL interpolation (not alpha
   blending). This matters: alpha-blending a dark color over the light cream
   mathematically desaturates toward gray at mid-opacity, which is exactly what
   went wrong before. Animating hue/saturation/lightness directly avoids that
   entirely and stays a rich brown the whole way through. Sits BEHIND the text
   and particle layers (lower z-index) so nothing it darkens ever gets dimmed
   along with it - particles and text ride on top and stay fully visible. */
#dark-wash{position:fixed;inset:0;pointer-events:none;z-index:5;background:radial-gradient(ellipse at 50% 38%,hsl(40,70%,97%) 0%,hsl(40,55%,94%) 65%)}

/* spotlights - real spotlight-sized circles, sitting above the dark-wash and
   particles but behind text, tracing oval/figure-8 paths like a real light rig */
.spotlight{position:fixed;width:380px;height:380px;border-radius:50%;pointer-events:none;z-index:20;opacity:0;background:radial-gradient(circle,rgba(255,246,220,0.95) 0%,rgba(255,224,150,0.55) 45%,rgba(255,224,150,0) 72%);transition:opacity 1.4s ease}

/* galaxy-swirl finale: many extra colored spotlights flood in during the final
   minute, riding the same smooth oval/figure-8 paths as the main three */
.mini-spotlight{position:fixed;border-radius:50%;pointer-events:none;z-index:20;opacity:0;transition:opacity 1.1s ease}
.spotlight-a{top:15%;left:10%;animation:spotOvalA 16s linear infinite}
.spotlight-b{top:55%;left:65%;animation:spotFigure8 22s linear infinite}
.spotlight-c{top:35%;left:40%;animation:spotOvalC 14s linear infinite}
@keyframes spotOvalA{0.0000%{transform:translate(0.00vw,0.00vh)}4.1667%{transform:translate(-0.61vw,2.85vh)}8.3333%{transform:translate(-2.41vw,5.50vh)}12.5000%{transform:translate(-5.27vw,7.78vh)}16.6667%{transform:translate(-9.00vw,9.53vh)}20.8333%{transform:translate(-13.34vw,10.63vh)}25.0000%{transform:translate(-18.00vw,11.00vh)}29.1667%{transform:translate(-22.66vw,10.63vh)}33.3333%{transform:translate(-27.00vw,9.53vh)}37.5000%{transform:translate(-30.73vw,7.78vh)}41.6667%{transform:translate(-33.59vw,5.50vh)}45.8333%{transform:translate(-35.39vw,2.85vh)}50.0000%{transform:translate(-36.00vw,0.00vh)}54.1667%{transform:translate(-35.39vw,-2.85vh)}58.3333%{transform:translate(-33.59vw,-5.50vh)}62.5000%{transform:translate(-30.73vw,-7.78vh)}66.6667%{transform:translate(-27.00vw,-9.53vh)}70.8333%{transform:translate(-22.66vw,-10.63vh)}75.0000%{transform:translate(-18.00vw,-11.00vh)}79.1667%{transform:translate(-13.34vw,-10.63vh)}83.3333%{transform:translate(-9.00vw,-9.53vh)}87.5000%{transform:translate(-5.27vw,-7.78vh)}91.6667%{transform:translate(-2.41vw,-5.50vh)}95.8333%{transform:translate(-0.61vw,-2.85vh)}100.0000%{transform:translate(0.00vw,-0.00vh)}}
@keyframes spotOvalC{0.0000%{transform:translate(0.00vw,0.00vh)}4.1667%{transform:translate(4.14vw,-0.44vh)}8.3333%{transform:translate(8.00vw,-1.74vh)}12.5000%{transform:translate(11.31vw,-3.81vh)}16.6667%{transform:translate(13.86vw,-6.50vh)}20.8333%{transform:translate(15.45vw,-9.64vh)}25.0000%{transform:translate(16.00vw,-13.00vh)}29.1667%{transform:translate(15.45vw,-16.36vh)}33.3333%{transform:translate(13.86vw,-19.50vh)}37.5000%{transform:translate(11.31vw,-22.19vh)}41.6667%{transform:translate(8.00vw,-24.26vh)}45.8333%{transform:translate(4.14vw,-25.56vh)}50.0000%{transform:translate(0.00vw,-26.00vh)}54.1667%{transform:translate(-4.14vw,-25.56vh)}58.3333%{transform:translate(-8.00vw,-24.26vh)}62.5000%{transform:translate(-11.31vw,-22.19vh)}66.6667%{transform:translate(-13.86vw,-19.50vh)}70.8333%{transform:translate(-15.45vw,-16.36vh)}75.0000%{transform:translate(-16.00vw,-13.00vh)}79.1667%{transform:translate(-15.45vw,-9.64vh)}83.3333%{transform:translate(-13.86vw,-6.50vh)}87.5000%{transform:translate(-11.31vw,-3.81vh)}91.6667%{transform:translate(-8.00vw,-1.74vh)}95.8333%{transform:translate(-4.14vw,-0.44vh)}100.0000%{transform:translate(-0.00vw,0.00vh)}}
@keyframes spotFigure8{0.0000%{transform:translate(0.00vw,0.00vh)}3.1250%{transform:translate(7.65vw,2.15vh)}6.2500%{transform:translate(14.14vw,4.21vh)}9.3750%{transform:translate(18.48vw,6.11vh)}12.5000%{transform:translate(20.00vw,7.78vh)}15.6250%{transform:translate(18.48vw,9.15vh)}18.7500%{transform:translate(14.14vw,10.16vh)}21.8750%{transform:translate(7.65vw,10.79vh)}25.0000%{transform:translate(0.00vw,11.00vh)}28.1250%{transform:translate(-7.65vw,10.79vh)}31.2500%{transform:translate(-14.14vw,10.16vh)}34.3750%{transform:translate(-18.48vw,9.15vh)}37.5000%{transform:translate(-20.00vw,7.78vh)}40.6250%{transform:translate(-18.48vw,6.11vh)}43.7500%{transform:translate(-14.14vw,4.21vh)}46.8750%{transform:translate(-7.65vw,2.15vh)}50.0000%{transform:translate(-0.00vw,0.00vh)}53.1250%{transform:translate(7.65vw,-2.15vh)}56.2500%{transform:translate(14.14vw,-4.21vh)}59.3750%{transform:translate(18.48vw,-6.11vh)}62.5000%{transform:translate(20.00vw,-7.78vh)}65.6250%{transform:translate(18.48vw,-9.15vh)}68.7500%{transform:translate(14.14vw,-10.16vh)}71.8750%{transform:translate(7.65vw,-10.79vh)}75.0000%{transform:translate(0.00vw,-11.00vh)}78.1250%{transform:translate(-7.65vw,-10.79vh)}81.2500%{transform:translate(-14.14vw,-10.16vh)}84.3750%{transform:translate(-18.48vw,-9.15vh)}87.5000%{transform:translate(-20.00vw,-7.78vh)}90.6250%{transform:translate(-18.48vw,-6.11vh)}93.7500%{transform:translate(-14.14vw,-4.21vh)}96.8750%{transform:translate(-7.65vw,-2.15vh)}100.0000%{transform:translate(-0.00vw,-0.00vh)}}

/* fast streaks that shoot across the screen - the "CRAZY" particle flood */
.zoom-particle{position:fixed;pointer-events:none;z-index:410;opacity:0;line-height:1;animation:zoomAcross var(--zdur,0.7s) linear forwards}
@keyframes zoomAcross{0%{transform:translate(0,0);opacity:0}10%{opacity:0.95}85%{opacity:0.95}100%{transform:translate(var(--zx),var(--zy));opacity:0}}

/* big launch-style number for the final 5 seconds */
#big-number{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.4);font-family:'Playfair Display',serif;font-weight:700;font-size:9rem;color:var(--rose);opacity:0;z-index:600;pointer-events:none;text-shadow:0 0 40px rgba(184,104,88,0.5)}
#big-number.pop{animation:bigNumberPop 0.9s cubic-bezier(0.16,1,0.3,1) forwards}
@keyframes bigNumberPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}45%{transform:translate(-50%,-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1)}}

/* ---------- REVEAL: FLASH ---------- */
#flash-overlay{position:fixed;inset:0;background:radial-gradient(circle,#fffdf0 0%,var(--gold) 100%);opacity:0;pointer-events:none;z-index:9998;transition:opacity 0.6s ease}
#flash-overlay.flash{opacity:0.92}

.sparkle.burst{animation:burstOut 1.4s ease-out forwards}
@keyframes burstOut{0%{opacity:1;transform:translate(0,0) scale(0.6)}100%{opacity:0;transform:translate(var(--bx),var(--by)) scale(1.4)}}

/* ---------- REVEAL: CURTAINS (long, theatrical) ---------- */
#curtain-left,#curtain-right{position:fixed;top:0;bottom:0;width:52%;z-index:9997;background:repeating-linear-gradient(90deg,#3a1210 0px,#5a1c16 16px,#3a1210 32px);box-shadow:0 0 90px rgba(0,0,0,0.6) inset;transition:transform 3.2s cubic-bezier(0.65,0,0.35,1)}
#curtain-left{left:0;transform:translateX(-100%)}
#curtain-right{right:0;transform:translateX(100%)}
#curtain-left.closed{transform:translateX(0)}
#curtain-right.closed{transform:translateX(0)}
#curtain-left.sway,#curtain-right.sway{animation:curtainSway 3.5s ease-in-out infinite}
@keyframes curtainSway{0%,100%{filter:brightness(1)}50%{filter:brightness(1.07)}}

#curtain-title{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;font-family:'Playfair Display',serif;font-style:italic;font-size:1.5rem;color:var(--warm);opacity:0;text-align:center;letter-spacing:1px;transition:opacity 1.3s ease;pointer-events:none;text-shadow:0 2px 20px rgba(0,0,0,0.8)}
#curtain-title.show{opacity:1}

/* ---------- PREMIERE STAGE (automatic scene player, fills the whole screen) ---------- */
.premiere{display:none;opacity:0;transition:opacity 1.4s ease;flex-direction:column;position:fixed;inset:0;z-index:30;padding:2vh 3vw;box-sizing:border-box}
.premiere.in{opacity:1}

.premiere-header{flex:0 0 auto;text-align:center;padding-bottom:0.8rem}
.premiere-footer{flex:0 0 auto;text-align:center;padding-top:0.8rem}

.marquee-lights{display:flex;justify-content:center;gap:9px;margin-bottom:0.5rem}
.marquee-lights span{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:bulbFlicker 1.3s ease-in-out infinite}
.marquee-lights span:nth-child(odd){animation-delay:0.35s}
.marquee-lights span:nth-child(3n){animation-delay:0.65s}
@keyframes bulbFlicker{0%,100%{opacity:0.3;box-shadow:none}50%{opacity:1;box-shadow:0 0 8px var(--gold)}}

.marquee{font-family:'Playfair Display',serif;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--rose);font-size:1.1rem;text-align:center}

/* the middle area: fills all remaining space between header and footer.
   both children are absolute overlays filling it completely, so they're
   never sharing flex space with each other (that was the centering bug) */
.scene-stage{position:relative;flex:1 1 auto;min-height:0;width:100%;overflow:hidden}

.scene-message{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.3rem;font-style:italic;color:var(--deep);line-height:1.7;text-align:center;padding:1rem 8vw;opacity:0;transform:translateY(10px);transition:opacity 1s ease,transform 1s ease}
.scene-message.in{opacity:1;transform:translateY(0)}

/* fills the entire scene-stage area edge to edge - YouTube's own player
   handles internal letterboxing, so no aspect-ratio math needed here */
.cinema-stage{position:absolute;inset:0;background:#000;border:10px solid var(--deep);border-radius:4px;box-shadow:0 20px 50px rgba(0,0,0,0.4),0 0 0 3px var(--gold) inset;overflow:hidden;opacity:0;transition:opacity 1s ease}
.cinema-stage.in{opacity:1}
#video-slot{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
#video-slot video,#video-slot iframe{width:100%;height:100%;display:block;background:#000;border:none}

.now-playing{font-family:'Caveat',cursive;font-size:0.95rem;color:var(--rose);text-align:center;min-height:1.3em}

.waiting-note{font-family:'Playfair Display',serif;font-size:1rem;font-style:italic;color:var(--deep);line-height:1.6;text-align:center;max-width:480px;margin:0.3rem auto 0}
</style>
</head>
<body>
<div id="entry-gate">
  <div class="entry-card">
    <div class="entry-title">Besties ♡</div>
    <div class="entry-sub">tap anywhere to begin</div>
  </div>
</div>

<div id="dark-wash"></div>
<div id="big-number"></div>
<div class="spotlight spotlight-a" id="spot-a"></div>
<div class="spotlight spotlight-b" id="spot-b"></div>
<div class="spotlight spotlight-c" id="spot-c"></div>

<div class="glow-layer" id="glows"></div>
<div class="drift-layer" id="drifts"></div>
<div class="sparkle-layer" id="sparkles"></div>

<div class="wrap">
  <div class="brand">Besties ♡</div>
  <p class="lead" id="lead">keep checking back soon ...</p>

  <div class="timer" id="timer">
    <div class="timer-unit"><div class="timer-num" id="t-days">00</div><div class="timer-label">Days</div></div>
    <div class="timer-unit"><div class="timer-num" id="t-hours">00</div><div class="timer-label">Hours</div></div>
    <div class="timer-unit"><div class="timer-num" id="t-mins">00</div><div class="timer-label">Minutes</div></div>
    <div class="timer-unit"><div class="timer-num" id="t-secs">00</div><div class="timer-label">Seconds</div></div>
  </div>
</div>

<div id="flash-overlay"></div>
<div id="curtain-left"></div>
<div id="curtain-right"></div>
<div id="curtain-title"></div>

<section class="premiere" id="premiere">
  <div class="premiere-header">
    <div class="marquee-lights">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="marquee">Bestie Pictures Presents</div>
  </div>

  <div class="scene-stage" id="scene-stage">
    <div class="scene-message" id="scene-message"></div>
    <div class="cinema-stage" id="cinema-stage" style="display:none">
      <div id="video-slot"></div>
    </div>
  </div>

  <div class="premiere-footer">
    <p class="now-playing" id="now-playing"></p>
    <p class="waiting-note">we'll be on call through all of this anyway - but enjoy the show ♡</p>
  </div>
</section>

<script>
// ---------- ENTRY GATE ----------
// one tap anywhere here satisfies the browser's "user gesture" requirement,
// so videos later in the automatic sequence are allowed to autoplay WITH sound.
let gestureUnlocked = false;
const entryGate = document.getElementById('entry-gate');
function unlockEntry(){
  if (gestureUnlocked) return;
  gestureUnlocked = true;
  entryGate.classList.add('hide');
}
entryGate.addEventListener('click', unlockEntry);
entryGate.addEventListener('touchstart', unlockEntry, {passive: true});

// Countdown target - 5th August 2026, 6:00pm.
// Written as UK local time (BST, UTC+1 in August). If the person this counts
// down for is somewhere else, adjust the "+01:00" offset below to match.
const TARGET = new Date('2026-07-19T01:00:00+01:00').getTime();

function pad(n) { return String(Math.max(0, n)).padStart(2, '0'); }

let lastBigNumber = null;
let currentEased = 0;
let currentDiff = Infinity;
let extraParticleCount = 0;
const BUILD_UP_SPAN = 360000; // 6 minutes - the whole build-up window

// color endpoints, defined in HSL rather than RGB. Interpolating hue/saturation/
// lightness directly (instead of blending raw RGB values) is what avoids the
// muddy gray midpoint - RGB-blending a light desaturated cream with a dark
// saturated brown genuinely produces a low-saturation gray at ~50%, no matter
// how the opacity/blend-mode is set up. Locking the hue and sweeping lightness
// (with saturation staying moderate-to-high throughout) keeps it "brown" the
// whole way, at every intermediate step, not just the two endpoints.
const BG_INNER_START = {h:40, s:70, l:97};
const BG_INNER_END   = {h:17.1, s:63.6, l:8.6}; // exact HSL match for the old #241008
const BG_OUTER_START = {h:40, s:55, l:94};
const BG_OUTER_END   = {h:22.5, s:66.6, l:4.7}; // exact HSL match for the old #140a04
const BRAND_START = {h:10, s:40, l:53}; // matches the original --rose closely
const BRAND_END   = {h:10, s:48, l:88};
const LEAD_START  = {h:28, s:43, l:33}; // matches the original --brown closely
const LEAD_END    = {h:28, s:50, l:85};

function lerp(a, b, t){ return a + (b - a) * t; }
function hslLerp(a, b, t){
  return `hsl(${lerp(a.h,b.h,t).toFixed(1)},${lerp(a.s,b.s,t).toFixed(1)}%,${lerp(a.l,b.l,t).toFixed(1)}%)`;
}

// spotlights enter on their own explicit schedule rather than a shared fade -
// spotlight 1 at 5min, spotlight 2 at 3:30, spotlight 3 at 2min, then all three
// go into "crazy mode" (full brightness + much faster sweep) in the final minute
const SPOTLIGHT_SCHEDULE = [
  { id: 'spot-a', at: 300000 }, // 5:00
  { id: 'spot-b', at: 210000 }, // 3:30
  { id: 'spot-c', at: 120000 }  // 2:00
];
const CRAZY_AT = 60000; // 1:00 - all spotlights go full intensity + fast

function tick() {
  const now = Date.now();
  const diff = TARGET - now;

  if (diff <= 0) {
    clearInterval(intervalId);
    triggerReveal();
    return;
  }

  updateBuildUp(diff);

  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const secs = Math.floor((diff % 60000) / 1000);

  setUnit('t-days', pad(days));
  setUnit('t-hours', pad(hours));
  setUnit('t-mins', pad(mins));
  setUnit('t-secs', pad(secs));
}

// continuous build-up from 6 minutes all the way to zero:
// - the page's background + text colors both animate in HSL space, from the
//   original light cream/ink tones toward the entry-gate's dark brown and a
//   light warm cream text - richly, without ever passing through gray
// - fully dark by 4 minutes out, held there the rest of the way to zero
// - spotlights enter one at a time on a fixed schedule, then go "crazy" at 1 minute
// - ambient particles speed up smoothly (via playbackRate, not duration rewrites)
//   and MORE of them physically spawn in as intensity rises
// - final 10 seconds: timer fades out, replaced by a big flashing launch-style number
function updateBuildUp(diff){
  const t = clamp(1 - diff / BUILD_UP_SPAN, 0, 1); // 0 at 6min+, 1 at zero
  const eased = t * t; // subtle early, much stronger near the end - drives particle chaos/speed

  // darkness/color: its own faster, mostly-linear timeline - fully there by 4 minutes,
  // held from there to zero
  const DARK_FULL_AT = 240000; // 4 minutes
  const darkT = clamp((BUILD_UP_SPAN - diff) / (BUILD_UP_SPAN - DARK_FULL_AT), 0, 1);

  [[65000,'mega-zoom'],[60000,'stage-60'],[30000,'stage-30'],[15000,'stage-15'],[10000,'stage-10'],[5000,'stage-5']]
    .forEach(([th, cls]) => { if (diff <= th) document.body.classList.add(cls); });

  // background + text colors, animated together in HSL space
  document.getElementById('dark-wash').style.background =
    `radial-gradient(ellipse at 50% 38%, ${hslLerp(BG_INNER_START, BG_INNER_END, darkT)} 0%, ${hslLerp(BG_OUTER_START, BG_OUTER_END, darkT)} 65%)`;
  document.querySelector('.brand').style.color = hslLerp(BRAND_START, BRAND_END, darkT);
  document.querySelector('.lead').style.color = hslLerp(LEAD_START, LEAD_END, darkT);

  // spotlights: enter on schedule, go full-intensity in the final minute
  const crazy = diff <= CRAZY_AT;
  SPOTLIGHT_SCHEDULE.forEach(s => {
    const el = document.getElementById(s.id);
    if (diff <= s.at) el.style.opacity = crazy ? '1' : '0.85';
  });

  // speed everything up smoothly using playbackRate - never touches duration,
  // so nothing restarts or snaps. spotlights get an extra kick once "crazy" hits.
  const rate = 1 + eased * 3.2; // up to ~4.2x speed right at zero
  document.querySelectorAll('.glow-blob,.sparkle,.drift').forEach(el => {
    el.getAnimations().forEach(a => { a.playbackRate = rate; });
  });
  const spotRate = rate * (crazy ? 2.6 : 1);
  document.querySelectorAll('.spotlight').forEach(el => {
    el.getAnimations().forEach(a => { a.playbackRate = spotRate; });
  });

  // record current intensity for the independent fast particle-spawn loop below
  // (updateBuildUp only runs once per second via the countdown tick, so spawning
  // particles here directly was capping the real rate at 1 batch/second no matter
  // how short the interval was set to - that's why it never felt like "enough")
  currentEased = eased;
  currentDiff = diff;

  const secLeft = Math.ceil(diff / 1000);
  if (secLeft <= 10 && secLeft >= 1 && secLeft !== lastBigNumber) {
    lastBigNumber = secLeft;
    flashBigNumber(secLeft);
  }
}

function spawnExtraParticle(eased){
  extraParticleCount++;
  const layer = document.getElementById('sparkles');
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.dataset.extra = '1';
  const sz = 2 + Math.random() * (3 + eased * 5);
  const dur = Math.max(0.8, 3.5 - eased * 2.8);
  const life = 2000 + Math.random() * 1600;
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--sop:${0.4+Math.random()*0.6};animation-duration:${dur}s`;
  layer.appendChild(s);
  setTimeout(() => { s.remove(); extraParticleCount--; }, life);
}

// fast streaks that shoot across the whole screen - these are what actually
// read as "CRAZY amounts zooming through", not just gently drifting dots
const ZOOM_GLYPHS = ['✦','✧','♡','•'];
const ZOOM_COLORS = ['#c8943a','#b86858','#d4b483','#7a9870'];
function spawnZoomParticle(eased){
  extraParticleCount++;
  const layer = document.getElementById('sparkles');
  const el = document.createElement('div');
  el.className = 'zoom-particle';
  el.dataset.extra = '1';
  const glyph = ZOOM_GLYPHS[Math.floor(Math.random() * ZOOM_GLYPHS.length)];
  const color = ZOOM_COLORS[Math.floor(Math.random() * ZOOM_COLORS.length)];
  if (glyph === '•') {
    const sz = 3 + Math.random() * 4;
    el.style.width = sz + 'px';
    el.style.height = sz + 'px';
    el.style.borderRadius = '50%';
    el.style.background = color;
  } else {
    el.textContent = glyph;
    el.style.fontSize = (0.8 + Math.random() * 0.9) + 'rem';
    el.style.color = color;
  }
  const fromLeft = Math.random() < 0.5;
  const startX = fromLeft ? -10 : 110;
  const endX = fromLeft ? 110 : -10;
  const startY = Math.random() * 100;
  const endY = startY + (Math.random() - 0.5) * 70;
  el.style.left = startX + 'vw';
  el.style.top = startY + 'vh';
  el.style.setProperty('--zx', (endX - startX) + 'vw');
  el.style.setProperty('--zy', (endY - startY) + 'vh');
  const dur = Math.max(0.28, 0.95 - eased * 0.65);
  el.style.setProperty('--zdur', dur + 's');
  layer.appendChild(el);
  setTimeout(() => { el.remove(); extraParticleCount--; }, dur * 1000 + 150);
}

function clearExtraParticles(){
  document.querySelectorAll('[data-extra]').forEach(el => el.remove());
  extraParticleCount = 0;
}

function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

function flashBigNumber(n){
  const el = document.getElementById('big-number');
  el.textContent = n;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

function setUnit(id, value) {
  const el = document.getElementById(id);
  if (el.textContent === value) return;
  el.textContent = value;
  el.classList.remove('tick');
  void el.offsetWidth;
  el.classList.add('tick');
}

const intervalId = setInterval(tick, 1000);
tick();

// particle spawning runs on its OWN fast loop, independent of the once-per-second
// countdown tick - this is what actually lets the flood scale up properly
setInterval(() => {
  if (currentEased > 0 && extraParticleCount < 1400) {
    const batch = 1 + Math.floor(currentEased * 16); // up to ~17 particles per fast-tick near the end
    for (let i = 0; i < batch; i++) {
      if (currentEased > 0.3 && Math.random() < currentEased) spawnZoomParticle(currentEased);
      else spawnExtraParticle(currentEased);
    }
  }
  maybeSpawnMiniSpotlight();
}, 70); // ~14 spawn ticks/sec at full intensity - genuinely a lot of particles

// ---------- GALAXY-SWIRL FINALE ----------
// during the crazy final minute, more and more colored spotlights flood in on
// top of the main three - each rides one of the same smooth oval/figure-8
// paths, in a random galaxy-ish color, fading in, drifting, then fading out
// and getting replaced. spawn rate ramps up hard as zero approaches.
const GALAXY_COLORS = [
  'rgba(255,246,220,0.95)', // warm white
  'rgba(255,170,150,0.9)',  // coral
  'rgba(210,170,255,0.85)', // violet
  'rgba(150,210,255,0.85)', // sky blue
  'rgba(255,205,110,0.92)', // gold
  'rgba(160,230,190,0.85)', // mint
  'rgba(255,140,190,0.85)'  // pink
];
let lastMiniSpawn = 0;
let miniSpotlightCount = 0;
const MINI_PATHS = ['spotOvalA', 'spotOvalC', 'spotFigure8'];

function maybeSpawnMiniSpotlight(){
  if (currentDiff > CRAZY_AT) return;
  const crazyT = clamp(1 - currentDiff / CRAZY_AT, 0, 1); // 0 at 60s left, 1 at zero
  const interval = 1300 - crazyT * 1200; // 1300ms down to ~100ms - "more and more"
  const now = Date.now();
  if (now - lastMiniSpawn < interval || miniSpotlightCount >= 18) return;
  lastMiniSpawn = now;
  spawnMiniSpotlight(crazyT);
}

function spawnMiniSpotlight(crazyT){
  miniSpotlightCount++;
  const el = document.createElement('div');
  el.className = 'mini-spotlight';
  const size = 140 + Math.random() * (220 + crazyT * 160);
  const color = GALAXY_COLORS[Math.floor(Math.random() * GALAXY_COLORS.length)];
  const fade = color.replace(/[\d.]+\)$/, '0)');
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.top = (Math.random() * 90) + '%';
  el.style.left = (Math.random() * 90) + '%';
  el.style.background = `radial-gradient(circle, ${color} 0%, ${fade} 70%)`;
  const anim = MINI_PATHS[Math.floor(Math.random() * MINI_PATHS.length)];
  const dur = Math.max(3, 8 - crazyT * 5); // paths sweep faster as it intensifies too
  el.style.animation = `${anim} ${dur}s linear infinite`;
  document.body.appendChild(el);
  requestAnimationFrame(() => { el.style.opacity = (0.5 + Math.random() * 0.4).toFixed(2); });
  const life = 3800 + Math.random() * 2600;
  setTimeout(() => {
    el.style.opacity = '0';
    setTimeout(() => { el.remove(); miniSpotlightCount--; }, 1200);
  }, life);
}

function clearMiniSpotlights(){
  document.querySelectorAll('.mini-spotlight').forEach(el => el.remove());
  miniSpotlightCount = 0;
}

// ---------- THE REVEAL ----------
// double flash -> curtains sweep shut (slow) -> hold, swaying, with a title card
// -> scene swaps underneath -> curtains sweep back open (slow) -> premiere fades
// in -> the automatic show begins. ~11 seconds start to finish.
function triggerReveal(){
  document.body.classList.remove('mega-zoom','stage-60','stage-30','stage-15','stage-10','stage-5');
  document.getElementById('dark-wash').style.opacity = '0';
  document.getElementById('spot-a').style.opacity = '0';
  document.getElementById('spot-b').style.opacity = '0';
  document.getElementById('spot-c').style.opacity = '0';
  clearExtraParticles();
  clearMiniSpotlights();
  currentDiff = Infinity; // stops the mini-spotlight spawner too
  currentEased = 0; // stops the independent fast spawn loop too

  const flash = document.getElementById('flash-overlay');
  const curtainL = document.getElementById('curtain-left');
  const curtainR = document.getElementById('curtain-right');
  const title = document.getElementById('curtain-title');

  // 1. a double flash + sparkle burst right at zero
  flash.classList.add('flash');
  launchRevealBurst();
  setTimeout(() => flash.classList.remove('flash'), 700);
  setTimeout(() => { flash.classList.add('flash'); launchRevealBurst(); }, 900);
  setTimeout(() => flash.classList.remove('flash'), 1500);

  // 2. curtains sweep shut, slowly
  setTimeout(() => {
    curtainL.classList.add('closed');
    curtainR.classList.add('closed');
  }, 600);

  // 3. once closed, a gentle sway and a title card fades in, holds, fades out
  setTimeout(() => {
    curtainL.classList.add('sway');
    curtainR.classList.add('sway');
    title.textContent = "It's time ♡";
    title.classList.add('show');
  }, 4200);
  setTimeout(() => title.classList.remove('show'), 6800);

  // 4. swap what's underneath while still hidden behind the curtains
  setTimeout(() => {
    document.querySelector('.wrap').style.display = 'none';
    document.getElementById('premiere').style.display = 'flex';
  }, 7300);

  // 5. curtains sweep back open, slowly, revealing the premiere
  setTimeout(() => {
    curtainL.classList.remove('sway', 'closed');
    curtainR.classList.remove('sway', 'closed');
  }, 7600);

  // 6. premiere fades in fully, then the automatic show begins
  setTimeout(() => document.getElementById('premiere').classList.add('in'), 10200);
  setTimeout(() => startScenes(), 11000);
}

function launchRevealBurst(){
  const layer = document.getElementById('sparkles');
  for (let i = 0; i < 34; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle burst';
    const angle = Math.random() * Math.PI * 2;
    const dist = 90 + Math.random() * 240;
    s.style.cssText = `left:50%;top:45%;width:${3+Math.random()*4}px;height:${3+Math.random()*4}px;--bx:${Math.cos(angle)*dist}px;--by:${Math.sin(angle)*dist}px;`;
    layer.appendChild(s);
    setTimeout(() => s.remove(), 1400);
  }
}

// ---------- THE AUTOMATIC SHOW ----------
// runs forever once started: message cards fade in and out, videos autoplay
// and advance automatically when they end. anything not ready is skipped.
// loops back to the start once it reaches the end.
//
// message scenes: { type:'message', text, duration }
// video scenes:   { type:'video', title, youtubeId, ready }
//   - youtubeId is the bit after "v=" or "youtu.be/" in the video's URL
//   - set ready:true once a video actually exists - until then it's auto-skipped
const SCENES = [
  { type: 'message', text: "It's time! ♡", duration: 4000 },
  { type: 'message', text: "The Office of Bestie Affairs' Technical Department is putting the finishing touches on the site \u2014 please enjoy the entertainment while you wait.", duration: 6200 },
  { type: 'video', title: 'Trailer', youtubeId: 'GetcsmJ9U3o', ready: true },
  { type: 'message', text: "more on the way soon...", duration: 3600 },
  { type: 'video', title: 'Trailer', youtubeId: '', ready: false },
  { type: 'message', text: "in the meantime: yes, we are still on call. no, you may not peek behind the curtain early.", duration: 4400 },
  { type: 'video', title: 'Trailer', youtubeId: 'S1Suq_FhgaA', ready: false },
  { type: 'message', text: "thank you for your patience \u2014 The Office of Bestie Affairs appreciates your continued cooperation.", duration: 4400 },
  { type: 'video', title: 'Trailer', youtubeId: '', ready: false }
];

// when a video isn't ready yet, instead of skipping silently, a handful of
// these play as quick "comments" in its place - pulled randomly, no repeats per reel
const COMMENT_POOL = [
  "bestie_anon: not me refreshing every 5 minutes",
  "🍿🍿🍿",
  "the wait is KILLING me",
  "10/10 production values so far ngl",
  "is this real life",
  "the Office of Bestie Affairs never disappoints",
  "she's gonna cry and I'm here for it",
  "same energy as an actual movie premiere fr",
  "okay but the curtains though??",
  "waiting patiently (lie)",
  "the marquee lights are sending me",
  "content!! more content!!",
  "brb screenshotting everything",
  "this is so unnecessarily elaborate and I love it",
  "someone check on the guy building this site",
  "the drama... the suspense...",
  "certified bestie moment",
  "no because the sparkles are doing too much (affectionate)",
  "I would also like a dedicated marquee",
  "we stan a production",
  "this is better than the last three films I've seen combined",
  "genuinely unwell about this",
  "put the trailer on repeat, thanks"
];

let sceneIndex = -1;
let sceneTimer = null;
let ytApiRequested = false;

function startScenes(){
  loadYouTubeAPI();
  nextScene();
}

function loadYouTubeAPI(){
  if (ytApiRequested) return;
  ytApiRequested = true;
  if (window.YT && window.YT.Player) return;
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

function nextScene(){
  clearTimeout(sceneTimer);
  sceneIndex = (sceneIndex + 1) % SCENES.length;
  const scene = SCENES[sceneIndex];
  if (scene.type === 'video' && (!scene.ready || !scene.youtubeId)) {
    playCommentReel();
    return;
  }
  scene.type === 'message' ? playMessageScene(scene) : playVideoScene(scene);
}

// fills a not-ready video's slot with 5-10 quick scrolling "comments" instead of nothing
function playCommentReel(){
  const count = 5 + Math.floor(Math.random() * 6); // 5-10
  const pool = [...COMMENT_POOL];
  const picks = [];
  for (let i = 0; i < count && pool.length; i++) {
    picks.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  let i = 0;
  function showNext(){
    if (i >= picks.length) { nextScene(); return; }
    playMessageScene({ text: picks[i], duration: 5000 }, showNext);
    i++;
  }
  showNext();
}

function playMessageScene(scene, onDone){
  onDone = onDone || nextScene;
  document.getElementById('cinema-stage').classList.remove('in');
  document.getElementById('cinema-stage').style.display = 'none';
  document.getElementById('now-playing').textContent = '';

  const el = document.getElementById('scene-message');
  el.style.display = 'flex';
  el.classList.remove('in');
  setTimeout(() => {
    el.textContent = scene.text;
    void el.offsetWidth;
    el.classList.add('in');
  }, 350);

  sceneTimer = setTimeout(() => {
    el.classList.remove('in');
    setTimeout(onDone, 400);
  }, scene.duration);
}

function playVideoScene(scene){
  const msgEl = document.getElementById('scene-message');
  msgEl.classList.remove('in');
  msgEl.style.display = 'none';

  const stage = document.getElementById('cinema-stage');
  stage.style.display = 'block';
  requestAnimationFrame(() => stage.classList.add('in'));
  document.getElementById('now-playing').textContent = `Now Showing: ${scene.title}`;

  const slot = document.getElementById('video-slot');
  slot.innerHTML = '';
  const playerDiv = document.createElement('div');
  playerDiv.id = 'yt-player-target';
  slot.appendChild(playerDiv);

  // safety net: if "ended" never fires for some reason, move on anyway
  sceneTimer = setTimeout(nextScene, 240000);

  (function startPlayer(){
    if (!window.YT || !window.YT.Player) { setTimeout(startPlayer, 200); return; }
    new YT.Player('yt-player-target', {
      videoId: scene.youtubeId,
      playerVars: { autoplay: 1, rel: 0, modestbranding: 1, playsinline: 1, mute: gestureUnlocked ? 0 : 1 },
      events: {
        onReady: e => e.target.playVideo(),
        onStateChange: e => { if (e.data === YT.PlayerState.ENDED) nextScene(); }
      }
    });
  })();
}

// gentle floating sparkles, purely decorative
const layer = document.getElementById('sparkles');
for (let i = 0; i < 26; i++) {
  const s = document.createElement('div');
  s.className = 'sparkle';
  const sz = 2 + Math.random() * 3;
  const dur = 3 + Math.random() * 4;
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--sop:${0.2+Math.random()*0.5};animation-duration:${dur}s;animation-delay:${Math.random()*4}s`;
  s.dataset.baseDuration = dur;
  layer.appendChild(s);
}

// soft ambient glow blobs, slowly drifting behind everything
const glowColors = ['#c8943a','#b86858','#7a9870','#d4b483'];
const glowLayer = document.getElementById('glows');
for (let i = 0; i < 4; i++) {
  const b = document.createElement('div');
  b.className = 'glow-blob';
  const size = 220 + Math.random() * 180;
  const dur = 10 + Math.random() * 8;
  b.style.cssText = `left:${Math.random()*90}%;top:${Math.random()*90}%;width:${size}px;height:${size}px;background:${glowColors[i % glowColors.length]};--bx:${(Math.random()-0.5)*140}px;--by:${(Math.random()-0.5)*140}px;animation-duration:${dur}s`;
  b.dataset.baseDuration = dur;
  glowLayer.appendChild(b);
}

// slow-drifting glyphs rising up the whole page for extra depth
const driftGlyphs = ['♡','✦','✧','•','◦'];
const driftColors = ['#c8943a','#b86858','#d4b483','#7a9870'];
const driftLayer = document.getElementById('drifts');
for (let i = 0; i < 22; i++) {
  const d = document.createElement('div');
  d.className = 'drift';
  const glyph = driftGlyphs[Math.floor(Math.random()*driftGlyphs.length)];
  const size = glyph === '•' || glyph === '◦' ? 4 + Math.random()*4 : 0.7 + Math.random()*1.1;
  const unit = glyph === '•' || glyph === '◦' ? 'px' : 'rem';
  d.textContent = (glyph === '•' || glyph === '◦') ? '' : glyph;
  if (glyph === '•' || glyph === '◦') {
    d.style.width = size + 'px';
    d.style.height = size + 'px';
    d.style.borderRadius = '50%';
    d.style.background = driftColors[Math.floor(Math.random()*driftColors.length)];
  } else {
    d.style.fontSize = size + unit;
    d.style.color = driftColors[Math.floor(Math.random()*driftColors.length)];
  }
  d.style.left = `${Math.random()*100}%`;
  d.style.setProperty('--dx', `${(Math.random()-0.5)*120}px`);
  d.style.setProperty('--drot', `${(Math.random()-0.5)*60}deg`);
  d.style.setProperty('--dop', `${0.25 + Math.random()*0.35}`);
  const driftDur = 14 + Math.random()*14;
  d.style.animationDuration = `${driftDur}s`;
  d.style.animationDelay = `${Math.random()*18}s`;
  d.dataset.baseDuration = driftDur;
  driftLayer.appendChild(d);
}
