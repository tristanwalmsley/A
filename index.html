<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Besties ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Caveat:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#faf4e8;--warm:#f0ddb8;--tan:#d4b483;--brown:#7a5230;--deep:#3a2010;--rose:#b86858;--gold:#c8943a;--sage:#7a9870;--paper:#fffdf5;--ink:#2a1a08}
html,body{height:100%}
body{background:radial-gradient(ellipse at 50% 38%, #fffaf0 0%, var(--cream) 65%);font-family:'EB Garamond',Georgia,serif;color:var(--ink);min-height:100vh;overflow-x:hidden;display:flex;align-items:center;justify-content:center;padding:2rem}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.6}

.glow-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.glow-blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:0.3;animation:blobDrift ease-in-out infinite alternate}
@keyframes blobDrift{from{transform:translate(0,0) scale(1)}to{transform:translate(var(--bx),var(--by)) scale(1.18)}}

.sparkle-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.sparkle{position:absolute;border-radius:50%;background:var(--gold);opacity:0;animation:sparkleFloat ease-in-out infinite}
@keyframes sparkleFloat{0%,100%{opacity:0;transform:translateY(0) scale(0.6)}50%{opacity:var(--sop);transform:translateY(-18px) scale(1)}}

.drift-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.drift{position:absolute;bottom:-5%;opacity:0;line-height:1;animation:driftUp linear infinite;will-change:transform,opacity}
@keyframes driftUp{
  0%{transform:translate(0,0) rotate(0deg);opacity:0}
  8%{opacity:var(--dop,0.5)}
  92%{opacity:var(--dop,0.5)}
  100%{transform:translate(var(--dx,20px),-115vh) rotate(var(--drot,20deg));opacity:0}
}

.wrap{position:relative;z-index:1;text-align:center;max-width:520px;animation:wrapIn 1s ease both}
@keyframes wrapIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.brand{font-family:'Caveat',cursive;font-size:1.4rem;color:var(--rose);font-weight:700;letter-spacing:0.5px;margin-bottom:2.2rem}
.lead{font-family:'Caveat',cursive;font-size:1.2rem;color:var(--brown);letter-spacing:0.5px;margin-bottom:2.5rem}

.timer{display:flex;justify-content:center;gap:0.8rem;flex-wrap:wrap;margin-bottom:2.6rem}
.timer-unit{background:var(--paper);border:1.5px solid var(--tan);box-shadow:4px 4px 0 var(--warm);padding:1.1rem 0.5rem 0.9rem;min-width:78px}
.timer-num{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:700;color:var(--deep);line-height:1;transition:transform 0.25s ease}
.timer-num.tick{animation:numTick 0.4s ease}
@keyframes numTick{0%{transform:translateY(-8px);opacity:0.4}100%{transform:translateY(0);opacity:1}}
.timer-label{font-family:'Caveat',cursive;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;color:var(--rose);margin-top:0.3rem}

.closing{font-family:'Playfair Display',serif;font-size:1.15rem;font-style:italic;color:var(--deep);line-height:1.6;display:none}
.closing.show{display:block;animation:wrapIn 0.8s ease both}
</style>
</head>
<body>
<div class="glow-layer" id="glows"></div>
<div class="drift-layer" id="drifts"></div>
<div class="sparkle-layer" id="sparkles"></div>

<div class="wrap">
  <div class="brand">Besties ♡</div>
  <p class="lead" id="lead">soon ...</p>

  <div class="timer" id="timer">
    <div class="timer-unit"><div class="timer-num" id="t-days">00</div><div class="timer-label">Days</div></div>
    <div class="timer-unit"><div class="timer-num" id="t-hours">00</div><div class="timer-label">Hours</div></div>
    <div class="timer-unit"><div class="timer-num" id="t-mins">00</div><div class="timer-label">Minutes</div></div>
    <div class="timer-unit"><div class="timer-num" id="t-secs">00</div><div class="timer-label">Seconds</div></div>
  </div>

  <p class="closing" id="closing">It's today. ♡</p>
</div>

<script>
// Countdown target — 5th August 2026, 6:00pm.
// Written as UK local time (BST, UTC+1 in August). If the person this counts
// down for is somewhere else, adjust the "+01:00" offset below to match.
const TARGET = new Date('2026-08-05T18:00:00+01:00').getTime();

function pad(n) { return String(Math.max(0, n)).padStart(2, '0'); }

function tick() {
  const now = Date.now();
  const diff = TARGET - now;

  if (diff <= 0) {
    document.getElementById('timer').style.display = 'none';
    document.getElementById('lead').style.display = 'none';
    document.getElementById('closing').classList.add('show');
    clearInterval(intervalId);
    return;
  }

  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const secs = Math.floor((diff % 60000) / 1000);

  setUnit('t-days', pad(days));
  setUnit('t-hours', pad(hours));
  setUnit('t-mins', pad(mins));
  setUnit('t-secs', pad(secs));
}

function setUnit(id, value) {
  const el = document.getElementById(id);
  if (el.textContent === value) return;
  el.textContent = value;
  el.classList.remove('tick');
  void el.offsetWidth;
  el.classList.add('tick');
}

const intervalId = setInterval(tick, 1000);
tick();

// gentle floating sparkles, purely decorative
const layer = document.getElementById('sparkles');
for (let i = 0; i < 26; i++) {
  const s = document.createElement('div');
  s.className = 'sparkle';
  const sz = 2 + Math.random() * 3;
  s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--sop:${0.2+Math.random()*0.5};animation-duration:${3+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
  layer.appendChild(s);
}

// soft ambient glow blobs, slowly drifting behind everything
const glowColors = ['#c8943a','#b86858','#7a9870','#d4b483'];
const glowLayer = document.getElementById('glows');
for (let i = 0; i < 4; i++) {
  const b = document.createElement('div');
  b.className = 'glow-blob';
  const size = 220 + Math.random() * 180;
  b.style.cssText = `left:${Math.random()*90}%;top:${Math.random()*90}%;width:${size}px;height:${size}px;background:${glowColors[i % glowColors.length]};--bx:${(Math.random()-0.5)*140}px;--by:${(Math.random()-0.5)*140}px;animation-duration:${10+Math.random()*8}s`;
  glowLayer.appendChild(b);
}

// slow-drifting glyphs rising up the whole page for extra depth
const driftGlyphs = ['♡','✦','✧','•','◦'];
const driftColors = ['#c8943a','#b86858','#d4b483','#7a9870'];
const driftLayer = document.getElementById('drifts');
for (let i = 0; i < 22; i++) {
  const d = document.createElement('div');
  d.className = 'drift';
  const glyph = driftGlyphs[Math.floor(Math.random()*driftGlyphs.length)];
  const size = glyph === '•' || glyph === '◦' ? 4 + Math.random()*4 : 0.7 + Math.random()*1.1;
  const unit = glyph === '•' || glyph === '◦' ? 'px' : 'rem';
  d.textContent = (glyph === '•' || glyph === '◦') ? '' : glyph;
  if (glyph === '•' || glyph === '◦') {
    d.style.width = size + 'px';
    d.style.height = size + 'px';
    d.style.borderRadius = '50%';
    d.style.background = driftColors[Math.floor(Math.random()*driftColors.length)];
  } else {
    d.style.fontSize = size + unit;
    d.style.color = driftColors[Math.floor(Math.random()*driftColors.length)];
  }
  d.style.left = `${Math.random()*100}%`;
  d.style.setProperty('--dx', `${(Math.random()-0.5)*120}px`);
  d.style.setProperty('--drot', `${(Math.random()-0.5)*60}deg`);
  d.style.setProperty('--dop', `${0.25 + Math.random()*0.35}`);
  d.style.animationDuration = `${14 + Math.random()*14}s`;
  d.style.animationDelay = `${Math.random()*18}s`;
  driftLayer.appendChild(d);
}
</script>
</body>
</html>
