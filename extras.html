<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Besties ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Caveat:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#faf4e8;--warm:#f0ddb8;--tan:#d4b483;--brown:#7a5230;--deep:#3a2010;--rose:#b86858;--gold:#c8943a;--sage:#7a9870;--paper:#fffdf5;--ink:#2a1a08}
html{scroll-behavior:smooth}
body{background:var(--cream);font-family:'EB Garamond',Georgia,serif;color:var(--ink);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.6}
nav{padding:0.8rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--tan);background:var(--paper);position:sticky;top:0;z-index:500;flex-wrap:wrap;gap:0.5rem}
.nav-brand{font-family:'Caveat',cursive;font-size:1.3rem;color:var(--rose);font-weight:700;text-decoration:none}
.nav-links{display:flex;gap:0.8rem;flex-wrap:wrap}
.nav-a{font-family:'Caveat',cursive;font-size:0.9rem;color:var(--brown);text-decoration:none;padding:0.25rem 0.6rem;border-radius:2px;transition:color 0.2s,background 0.2s;letter-spacing:0.5px;white-space:nowrap}
.nav-a:hover{color:var(--deep);background:var(--warm)}
.nav-a.current{color:var(--deep);font-weight:700;border-bottom:2px solid var(--gold)}
.nav-a.locked{color:rgba(58,32,16,0.25);cursor:not-allowed;pointer-events:none}
.nav-a.locked::after{content:'✦';font-size:0.5rem;position:absolute;top:-2px;right:-2px;color:var(--tan)}
.page-header{text-align:center;padding:3rem 2rem 0.5rem;animation:headerIn 0.7s ease both}
@keyframes headerIn{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
.page-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:400;font-style:italic;color:var(--deep)}
.page-header p{font-family:'Caveat',cursive;font-size:1.1rem;color:var(--brown);margin-top:0.4rem;letter-spacing:0.5px}
.content-wrap{max-width:600px;margin:0 auto;padding:2rem 1.5rem 6rem}
.section-rule{display:flex;align-items:center;gap:1rem;margin-bottom:1.4rem}
.rule-line{flex:1;height:1px;background:var(--tan)}
.rule-diamond{color:var(--gold);font-size:1rem}
.section-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:400;font-style:italic;color:var(--deep);margin-bottom:1.5rem}
/* FACTS */
.facts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:3.5rem}
.fact-card{background:var(--paper);border:1px solid var(--tan);padding:1.2rem 1.3rem;box-shadow:4px 4px 0 var(--warm);opacity:0;transform:translateY(16px);transition:opacity 0.5s ease,transform 0.5s cubic-bezier(0.22,1,0.36,1)}
.fact-card.visible{opacity:1;transform:translateY(0)}
.fact-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--gold);line-height:1}
.fact-label{font-family:'Caveat',cursive;font-size:0.95rem;color:var(--brown);margin-top:0.15rem;letter-spacing:0.5px;line-height:1.4}
/* PREDICTIONS */
.predictions-list{display:flex;flex-direction:column;gap:0.7rem}
.prediction-item{display:flex;align-items:flex-start;gap:0.8rem;background:var(--paper);border:1px solid var(--tan);padding:0.9rem 1.1rem;box-shadow:3px 3px 0 var(--warm);opacity:0;transform:translateX(-20px);transition:opacity 0.5s ease,transform 0.5s cubic-bezier(0.22,1,0.36,1)}
.prediction-item.visible{opacity:1;transform:translateX(0)}
.pred-checkbox{width:22px;height:22px;border:2px solid var(--gold);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.2s;margin-top:2px}
.pred-checkbox:hover{background:var(--warm)}
.pred-checkbox.checked{background:var(--sage);border-color:var(--sage);color:white;font-family:'Caveat',cursive;font-size:0.9rem}
.pred-text{font-size:0.97rem;line-height:1.65;color:var(--deep)}
.pred-text.checked-text{text-decoration:line-through;color:var(--brown);font-style:italic}
.pred-note{font-family:'Caveat',cursive;font-size:0.82rem;color:var(--rose);margin-top:0.2rem;letter-spacing:0.3px}
.preds-note{font-family:'Caveat',cursive;font-size:0.9rem;color:var(--brown);margin-top:1.2rem;font-style:italic;text-align:center;letter-spacing:0.5px}
</style>
</head>
<body>
<nav id="site-nav">
  <a href="index.html" class="nav-brand">Besties ♡</a>
  <div class="nav-links"></div>
</nav>

<div class="page-header">
  <h1>Us, in numbers &amp; predictions</h1>
  <p>facts, figures, and a few things Tristan reckons will happen ♡</p>
</div>

<div class="content-wrap">
  <div class="section-rule"><div class="rule-line"></div><div class="rule-diamond">✦</div><div class="rule-line"></div></div>
  <div class="section-title">Fun facts about us</div>
  <div class="facts-grid" id="facts-grid"></div>

  <div class="section-rule"><div class="rule-line"></div><div class="rule-diamond">✦</div><div class="rule-line"></div></div>
  <div class="section-title">Predictions for next year</div>
  <p style="font-family:'Caveat',cursive;font-size:0.95rem;color:var(--brown);margin:-0.5rem 0 1.2rem;letter-spacing:0.5px">check them off as they come true — that's Ann's job ♡</p>
  <div class="predictions-list" id="pred-list"></div>
  <p class="preds-note">made on 5 Aug 2026 · check back throughout the year</p>
</div>

<script src="nav.js"></script>
<script>
window.addEventListener('DOMContentLoaded', () => { buildNav('extras.html'); buildFacts(); buildPredictions(); });

const FACTS = [
  {num:'3.6',  label:'years of bestie friendship'},
  {num:'~588', label:'hours on call together on Discord (rough estimate)'},
  {num:'4',    label:'birthdays celebrated together'},
  {num:'3',    label:'Christmases celebrated'},
  {num:'7',    label:'gift exchanges'},
  {num:'2',    label:'official bestie contracts signed (now 3)'},
  {num:'12',   label:'postcards sent to Ann across the sea'},
  {num:'19',   label:'postcards sent to Tristan across the sea'},
  {num:'4',    label:'months of Tristan learning Dutch'},
  {num:'1',    label:'plushie beginning its first journey'},
  {num:'∞',   label:'ordinary evenings made into uncontrollable laughter'},
];
function buildFacts(){
  const grid=document.getElementById('facts-grid');
  FACTS.forEach((f,i)=>{
    const c=document.createElement('div'); c.className='fact-card'; c.style.transitionDelay=i*0.06+'s';
    c.innerHTML=`<div class="fact-num">${f.num}</div><div class="fact-label">${f.label}</div>`;
    grid.appendChild(c);
  });
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:0.1});
  document.querySelectorAll('.fact-card').forEach(el=>obs.observe(el));
}

const PREDS_KEY='ann_predictions_2025';
const PREDICTIONS=[
  {text:'The plushie will make its first return journey at Christmas if Ann remembers', note:'mark this off when it arrives back!'},
  {text:'We will have several calls that go on for 12+ hours, unplanned'},
  {text:'Ann will master something new and impressive (because she always does)'},
  {text:'The Dutch language learning will progress significantly by Ann\'s next birthday', note:'🇳🇱 evidence required'},
  {text:'We will become even more inexplicably in sync'},
  {text:'We will start and maintain at least several new ongoing bits'},
  {text:'Ann will use the biscuit tier list at least once more after today'},
  {text:'The weekly schedule will live on another year... about'},
  {text:'The friendship will be measurably better in year four than year three (which is already saying something)'},
];
function buildPredictions(){
  const list=document.getElementById('pred-list');
  let checked=[];
  try{const p=JSON.parse(localStorage.getItem(PREDS_KEY));checked=Array.isArray(p)?p:[];}catch(e){}
  PREDICTIONS.forEach((p,i)=>{
    const item=document.createElement('div'); item.className='prediction-item'; item.style.transitionDelay=i*0.06+'s';
    const isChecked=checked.includes(i);
    item.innerHTML=`<div class="pred-checkbox ${isChecked?'checked':''}" onclick="togglePred(${i},this)">${isChecked?'✓':''}</div>
      <div><div class="pred-text ${isChecked?'checked-text':''}">${p.text}</div>${p.note?`<div class="pred-note">${p.note}</div>`:''}</div>`;
    list.appendChild(item);
  });
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:0.1});
  document.querySelectorAll('.prediction-item').forEach(el=>obs.observe(el));
}
function togglePred(idx,checkbox){
  let checked=[];
  try{const p=JSON.parse(localStorage.getItem(PREDS_KEY));checked=Array.isArray(p)?p:[];}catch(e){}
  const was=checked.includes(idx);
  if(was){checked=checked.filter(i=>i!==idx);}else{checked.push(idx);}
  localStorage.setItem(PREDS_KEY,JSON.stringify(checked));
  checkbox.classList.toggle('checked'); checkbox.textContent=!was?'✓':'';
  const t=checkbox.nextElementSibling?.querySelector('.pred-text');
  if(t)t.classList.toggle('checked-text');
}
</script>
</body>
</html>
