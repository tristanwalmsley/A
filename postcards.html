<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Besties ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Caveat:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#faf4e8;--warm:#f0ddb8;--tan:#d4b483;--brown:#7a5230;--deep:#3a2010;--rose:#b86858;--gold:#c8943a;--sage:#7a9870;--paper:#fffdf5;--ink:#2a1a08}
html{scroll-behavior:smooth}
body{background:var(--cream);font-family:'EB Garamond',Georgia,serif;color:var(--ink);min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.6}

/* NAV */
nav{padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--tan);background:var(--paper);position:sticky;top:0;z-index:500}
.nav-brand{font-family:'Caveat',cursive;font-size:1.3rem;color:var(--rose);font-weight:700;text-decoration:none}
.nav-links{display:flex;gap:1.2rem;flex-wrap:wrap}
.nav-a{font-family:'Caveat',cursive;font-size:1rem;color:var(--brown);text-decoration:none;padding:0.3rem 0.7rem;border-radius:2px;transition:color 0.2s,background 0.2s;letter-spacing:0.5px}
.nav-a:hover{color:var(--deep);background:var(--warm)}
.nav-a.current{color:var(--deep);font-weight:700;border-bottom:2px solid var(--gold)}

/* HEADER */
.page-header{text-align:center;padding:3rem 2rem 1.5rem;animation:headerIn 0.7s ease both}
@keyframes headerIn{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}
.page-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:400;font-style:italic;color:var(--deep)}
.page-header p{font-family:'Caveat',cursive;font-size:1.1rem;color:var(--brown);margin-top:0.4rem;letter-spacing:0.5px}

/* DIRECTION TABS — top level */
.dir-tabs{display:flex;max-width:900px;margin:0 auto 0;padding:0 1.5rem;gap:0;border-bottom:2px solid var(--tan)}
.dir-tab{font-family:'Caveat',cursive;font-size:1.1rem;letter-spacing:0.5px;padding:0.7rem 1.8rem;border:none;background:transparent;color:var(--brown);cursor:pointer;transition:color 0.2s,background 0.2s;border-bottom:3px solid transparent;margin-bottom:-2px;position:relative}
.dir-tab:hover{color:var(--deep);background:var(--warm)}
.dir-tab.active{color:var(--deep);font-weight:700;border-bottom:3px solid var(--gold);background:var(--cream)}

/* DIRECTION PANELS */
.dir-panel{display:none}
.dir-panel.active{display:block;animation:panelIn 0.35s ease}
@keyframes panelIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CATEGORY FILTER TABS — per panel */
.filter-wrap{max-width:900px;margin:0 auto;padding:1.2rem 1.5rem 1rem;display:flex;gap:0.5rem;flex-wrap:wrap;justify-content:center}
.filter-btn{font-family:'Caveat',cursive;font-size:0.92rem;letter-spacing:0.5px;padding:0.32rem 0.95rem;border:1.5px solid var(--tan);background:transparent;color:var(--brown);cursor:pointer;transition:all 0.2s}
.filter-btn:hover{background:var(--warm)}
.filter-btn.active{background:var(--deep);color:var(--cream);border-color:var(--deep)}

/* GALLERY */
.gallery-wrap{max-width:960px;margin:0 auto;padding:0 1.5rem 3rem}
.gallery-section{margin-bottom:2.5rem}
.gallery-section-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:400;font-style:italic;color:var(--brown);margin-bottom:1.1rem;padding-bottom:0.5rem;border-bottom:1px dashed var(--warm);display:flex;align-items:center;gap:0.8rem}
.gallery-section-title span{font-family:'Caveat',cursive;font-size:0.78rem;color:var(--tan);letter-spacing:2px;text-transform:uppercase;font-style:normal}
.postcard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1.3rem}

/* POSTCARD CARD */
.pc-card{position:relative;cursor:pointer;opacity:0;transform:translateY(18px) rotate(var(--rot));transition:opacity 0.5s ease,transform 0.5s cubic-bezier(0.22,1,0.36,1);filter:drop-shadow(3px 5px 10px rgba(0,0,0,0.11))}
.pc-card.visible{opacity:1;transform:translateY(0) rotate(var(--rot))}
.pc-card:hover{transform:translateY(-6px) rotate(0deg) scale(1.04)!important;filter:drop-shadow(5px 10px 18px rgba(0,0,0,0.19));z-index:10}
.pc-inner{background:var(--paper);border:1px solid var(--tan);overflow:hidden;position:relative}
.pc-face{width:100%;aspect-ratio:3/2;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.pc-face-content{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0.3rem}
.pc-art-text{font-family:'Playfair Display',serif;font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;position:absolute;bottom:0.4rem;right:0.5rem;color:rgba(255,255,255,0.75)}
.pc-bottom{padding:0.45rem 0.65rem;background:var(--paper);border-top:1px solid var(--warm)}
.pc-label{font-family:'Caveat',cursive;font-size:0.75rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--brown);display:block}
.pc-title{font-family:'Playfair Display',serif;font-size:0.82rem;color:var(--deep);line-height:1.3;margin-top:0.08rem}
.pc-sent{font-family:'Caveat',cursive;font-size:0.7rem;color:var(--tan);margin-top:0.12rem}
.pc-stamp{position:absolute;top:0.45rem;right:0.45rem;width:26px;height:32px;background:var(--cream);border:1.5px solid var(--rose);display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:var(--rose);font-family:'Caveat',cursive}

/* COLOR CLASSES */
.ww1{background:linear-gradient(135deg,#8a6a4a,#b08050)}
.lancashire{background:linear-gradient(135deg,#4a6a8a,#7a9aaa)}
.funny{background:linear-gradient(135deg,#e0a840,#c87040)}
.mogsweep{background:linear-gradient(135deg,#8a5870,#c88898)}
.snailmail{background:linear-gradient(135deg,#5a7860,#8ab098)}
.from-ann{background:linear-gradient(135deg,#7a6a8a,#aaa0c0)}

/* LIGHTBOX */
#lightbox{display:none;position:fixed;inset:0;z-index:2000;align-items:center;justify-content:center;padding:2rem}
#lightbox.open{display:flex}
.lb-backdrop{position:absolute;inset:0;background:rgba(20,8,2,0.85);cursor:pointer}
.lb-card{position:relative;z-index:1;max-width:500px;width:100%;animation:lbIn 0.32s cubic-bezier(0.22,1,0.36,1)}
@keyframes lbIn{from{opacity:0;transform:scale(0.85) rotate(-1deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}

/* Postcard flip layout in lightbox */
.lb-postcard{background:var(--paper);border:1px solid var(--tan);box-shadow:8px 8px 0 var(--tan),16px 16px 0 rgba(0,0,0,0.07)}
.lb-face{width:100%;aspect-ratio:3/2;display:flex;align-items:center;justify-content:center;font-size:5rem}
.lb-back{padding:0;border-top:1px solid var(--warm);display:grid;grid-template-columns:1fr 1px 1fr;min-height:160px}
.lb-back-message{padding:1.2rem 1.3rem;position:relative}
.lb-back-message::before{content:'';position:absolute;inset:8px;border:1px dashed var(--warm);pointer-events:none}
.lb-back-divider{background:var(--tan);width:1px}
.lb-back-address{padding:1.2rem 1.3rem;display:flex;flex-direction:column;gap:0.6rem}
.lb-stamp-area{align-self:flex-start;width:46px;height:56px;border:1.5px solid var(--rose);background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-left:auto}
.lb-address-lines{margin-top:auto}
.lb-address-line{font-family:'Caveat',cursive;font-size:0.82rem;color:var(--brown);border-bottom:1px solid var(--warm);padding-bottom:0.2rem;margin-bottom:0.18rem}
.lb-message-text{font-family:'Caveat',cursive;font-size:1rem;color:var(--ink);line-height:1.65;position:relative;z-index:1}
.lb-message-placeholder{font-family:'Caveat',cursive;font-size:0.85rem;color:var(--locked-text,#b0a898);font-style:italic;line-height:1.6;position:relative;z-index:1}
.lb-meta{padding:0.6rem 1rem;background:var(--warm);border-top:1px solid var(--tan);display:flex;align-items:center;justify-content:space-between}
.lb-title{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;color:var(--deep)}
.lb-close{width:32px;height:32px;background:var(--deep);color:var(--cream);border:none;border-radius:50%;cursor:pointer;font-family:'Caveat',cursive;font-size:1rem;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 6px rgba(0,0,0,0.25);transition:background 0.2s;flex-shrink:0}
.lb-close:hover{background:var(--brown)}

/* NOTE BOX */
.note-section{max-width:640px;margin:0 auto 4rem;padding:0 1.5rem}
.note-box{background:var(--paper);border:1px solid var(--tan);padding:1.5rem 2rem;box-shadow:5px 5px 0 var(--warm)}
.note-box p{font-size:1rem;line-height:1.8;color:var(--brown);font-style:italic}
.note-box p+p{margin-top:0.8rem}
</style>
</head>
<body>
<nav id="site-nav">
  <a href="index.html" class="nav-brand">Besties ♡</a>
  <div class="nav-links"></div>
</nav>

<div class="page-header">
  <h1>Postcard Gallery</h1>
  <p>every postcard that's crossed the sea ♡</p>
</div>

<!-- DIRECTION TABS -->
<div class="dir-tabs">
  <button class="dir-tab active" id="dtab-to-ann" onclick="switchDir('to-ann')">From Tristan → Ann</button>
  <button class="dir-tab" id="dtab-to-tri" onclick="switchDir('to-tri')">From Ann → Tristan</button>
</div>

<!-- ══ PANEL: TRISTAN → ANN ══ -->
<div class="dir-panel active" id="panel-to-ann">
  <div class="filter-wrap" id="filters-to-ann">
    <button class="filter-btn active" onclick="filterCards('all','to-ann',this)">All</button>
    <button class="filter-btn" onclick="filterCards('ww1','to-ann',this)">WWI Series</button>
    <button class="filter-btn" onclick="filterCards('lancashire','to-ann',this)">Lancashire</button>
    <button class="filter-btn" onclick="filterCards('funny','to-ann',this)">Fruity</button>
    <button class="filter-btn" onclick="filterCards('mogsweep','to-ann',this)">MogSweep</button>
  </div>
  <div class="gallery-wrap" id="gallery-to-ann"></div>
</div>

<!-- ══ PANEL: ANN → TRISTAN ══ -->
<div class="dir-panel" id="panel-to-tri">
  <div class="filter-wrap" id="filters-to-tri">
    <button class="filter-btn active" onclick="filterCards('all','to-tri',this)">All</button>
    <button class="filter-btn" onclick="filterCards('originals','to-tri',this)">Originals</button>
    <button class="filter-btn" onclick="filterCards('dutch sayings','to-tri',this)">Dutch Sayings</button>
  </div>
  <div class="gallery-wrap" id="gallery-to-tri"></div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div class="lb-backdrop" onclick="closeLightbox()"></div>
  <div class="lb-card" id="lb-card">
    <div class="lb-postcard">
      <div class="lb-face" id="lb-face"></div>
      <div class="lb-back">
        <div class="lb-back-message">
          <div id="lb-message"></div>
        </div>
        <div class="lb-back-divider"></div>
        <div class="lb-back-address">
          <div class="lb-stamp-area" id="lb-stamp-emoji"></div>
          <div class="lb-address-lines">
            <div class="lb-address-line" id="lb-addr1"></div>
            <div class="lb-address-line" id="lb-addr2"></div>
            <div class="lb-address-line" id="lb-addr3"></div>
            <div class="lb-address-line" id="lb-addr4"></div>
          </div>
        </div>
      </div>
      <div class="lb-meta">
        <div class="lb-title" id="lb-title"></div>
        <button class="lb-close" onclick="closeLightbox()">✕</button>
      </div>
    </div>
  </div>
</div>

<script src="nav.js"></script>
<script>
// ══════════════════════════════════════
// POSTCARD DATA
// message = what's written on the back (fill these in!)
// addr = address lines shown on right side of back
// ══════════════════════════════════════

const POSTCARDS_TO_ANN = [
  // ── WWI Series ──
  {id:'w1', cat:'ww1', colorClass:'ww1', emoji:'✉️',
    label:'WWI Series', title:'WWI Postcard No. 1', sent:'Aug 2025',
    message: null, // ← fill in what you wrote!
    addr: ['Annika Plaggenborg', 'The Netherlands', '🇳🇱'] },
  {id:'w2', cat:'ww1', colorClass:'ww1', emoji:'📜',
    label:'WWI Series', title:'WWI Postcard No. 2', sent:'Aug 2025',
    message: null,
    addr: ['Annika Plaggenborg', 'The Netherlands', '🇳🇱'] },
  {id:'w3', cat:'ww1', colorClass:'ww1', emoji:'🗺️',
    label:'WWI Series', title:'WWI Postcard No. 3', sent:'Aug 2025',
    message: null,
    addr: ['Annika Plaggenborg', 'The Netherlands', '🇳🇱'] },
  {id:'w4', cat:'ww1', colorClass:'ww1', emoji:'🪶',
    label:'WWI Series', title:'WWI Postcard No. 4', sent:'Aug 2025',
    message: null,
    addr: ['Annika Plaggenborg', 'The Netherlands', '🇳🇱'] },
  // ── Lancashire ──
  {id:'l1', cat:'lancashire', colorClass:'lancashire', emoji:'🏙️',
    label:'Lancashire', title:'Lancashire No. 1', sent:'Aug 2025',
    message: null,
    addr: ['Annika Plaggenborg', 'The Netherlands', '🇳🇱'] },
  {id:'l2', cat:'lancashire', colorClass:'lancashire', emoji:'🌉',
    label:'Lancashire', title:'Lancashire No. 2', sent:'Aug 2025',
    message: null,
    addr: ['Annika Plaggenborg', 'The Netherlands', '🇳🇱'] },
  {id:'l3', cat:'lancashire', colorClass:'lancashire', emoji:'🏘️',
    label:'Lancashire', title:'Lancashire No. 3', sent:'Aug 2025',
    message: null,
    addr: ['Annika Plaggenborg', 'The Netherlands', '🇳🇱'] },
  {id:'l4', cat:'lancashire', colorClass:'lancashire', emoji:'🌄',
    label:'Lancashire', title:'Lancashire No. 4', sent:'Aug 2025',
    message: null,
    addr: ['Annika Plaggenborg', 'The Netherlands', '🇳🇱'] },
  // ── Fruity ──
  {id:'f1', cat:'funny', colorClass:'funny', emoji:'🍉',
    label:'Fruity Motivation', title:'Fruity Postcard No. 1', sent:'Aug 2025',
    message: null,
    addr: ['Annika Plaggenborg', 'The Netherlands', '🇳🇱'] },
  {id:'f2', cat:'funny', colorClass:'funny', emoji:'🍋',
    label:'Fruity Motivation', title:'Fruity Postcard No. 2', sent:'Aug 2025',
    message: null,
    addr: ['Annika Plaggenborg', 'The Netherlands', '🇳🇱'] },
  // ── MogSweep ──
  {id:'m1', cat:'mogsweep', colorClass:'mogsweep', emoji:'🐦',
    label:'MogSweep · Etsy', title:'Pigeon Post', sent:'Aug 2025',
    message: null,
    addr: ['Annika Plaggenborg', 'The Netherlands', '🇳🇱'] },
  {id:'m2', cat:'mogsweep', colorClass:'snailmail', emoji:'🐌',
    label:'MogSweep · Etsy', title:'Snail Mail', sent:'Aug 2025',
    message: null,
    addr: ['Annika Plaggenborg', 'The Netherlands', '🇳🇱'] },
];

// ── Postcards Ann has sent to Tristan ──
// Add more entries here as they arrive! Same format as above.
const POSTCARDS_TO_TRI = [
  {id:'a1', cat:'originals', colorClass:'from-ann', emoji:'🕰️',
    label:'Originals', title:'To Be Continued..', sent:'Dec 2024',
    message: '',
    addr: ['', '', '', ''] },
  {id:'a2', cat:'originals', colorClass:'from-ann', emoji:'🧸',
    label:'Originals', title:'Paddington In Peru', sent:'Dec 2024',
    message: '',
    addr: ['', '', '', ''] },
  {id:'a3', cat:'originals', colorClass:'from-ann', emoji:'👆',
    label:'Originals', title:'Fuck 2024', sent:'Dec 2024',
    message: '',
    addr: ['', '', '', ''] },
  {id:'a4', cat:'dutch sayings', colorClass:'from-ann', emoji:'😂',
    label:'Dutch Sayings', title:'Laughing Closer Than Crying', sent:'May 2025',
    message: 'Hi! This one means "laughing is closer to me than crying", and I\'m writing this while watching a... the stream of yours where you got like 100 subs from some INSANE people... Congrats!! You deserve them. And this card\'s text seems fitting based on the happenings.',
    addr: ['To Tristan Walmsley', 'Flat 73 Whitendale Hall', 'Harrington Street, Preston', 'PR1 7BG, United Kingdom'] },
  {id:'a5', cat:'dutch sayings', colorClass:'from-ann', emoji:'❄️',
    label:'Dutch Sayings', title:'Winter Sleeplet Do?', sent:'May 2025',
    message: 'Heya! This one means "winter-sleeplet do?" to be literal, which is kinda real \'cuz I first wrote the pink-red card and now it\'s already 3 May (00:00) to be super precise. - Ann (this time with space leftover)',
    addr: ['To Tristan Walmsley', 'Flat 73 Whitendale Hall', 'Harrington Street, Preston', 'PR1 7BG, United Kingdom'] },
  {id:'a6', cat:'dutch sayings', colorClass:'from-ann', emoji:'✈️',
    label:'Dutch Sayings', title:'Is it a bird?', sent:'May 2025',
    message: 'Heyyyy!! Last one of these three =) This one: "Is it a bird? Is it a plane? No, it\'s a card I found somewhere." You\'re welcome. So welcome. -Ann ; :) hope you enjoy these!!',
    addr: ['you already knew what I\'d put here anyway!', 'Hey went "haha funny" and went for the one of the two items that has the', 'right purpose but doesn\'t rhyme. Rude.', 'paraple (or UK: umbrella.)'] },
];

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let activeDir = 'to-ann';
const activeFilters = { 'to-ann': 'all', 'to-tri': 'all' };

function switchDir(dir) {
  activeDir = dir;
  document.querySelectorAll('.dir-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.dir-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('dtab-' + dir).classList.add('active');
  document.getElementById('panel-' + dir).classList.add('active');
  renderGallery(dir);
}

function filterCards(cat, dir, btn) {
  activeFilters[dir] = cat;
  const wrap = document.getElementById('filters-' + dir);
  wrap.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery(dir);
}

function renderGallery(dir) {
  const all = dir === 'to-ann' ? POSTCARDS_TO_ANN : POSTCARDS_TO_TRI;
  const cat = activeFilters[dir];
  const cards = cat === 'all' ? all : all.filter(c => c.cat === cat);
  const galleryEl = document.getElementById('gallery-' + dir);
  galleryEl.innerHTML = '';

  // Group by label
  const groups = {};
  const order = [];
  cards.forEach(c => {
    if (!groups[c.label]) { groups[c.label] = []; order.push(c.label); }
    groups[c.label].push(c);
  });

  if (order.length === 0) {
    galleryEl.innerHTML = '<p style="font-family:\'Caveat\',cursive;color:var(--brown);text-align:center;padding:2rem;font-size:1.05rem">No postcards here yet ♡</p>';
    return;
  }

  order.forEach((label, gi) => {
    const sec = document.createElement('div');
    sec.className = 'gallery-section';
    sec.innerHTML = `<div class="gallery-section-title">${label} <span>${groups[label].length} card${groups[label].length !== 1 ? 's' : ''}</span></div>`;
    const grid = document.createElement('div');
    grid.className = 'postcard-grid';
    groups[label].forEach((card, i) => {
      const rot = (Math.random() - 0.5) * 4;
      const el = document.createElement('div');
      el.className = 'pc-card';
      el.style.setProperty('--rot', rot + 'deg');
      el.style.transitionDelay = (i * 0.06 + gi * 0.08) + 's';
      el.innerHTML = `
        <div class="pc-inner" onclick="openLightbox('${card.id}','${dir}')">
          <div class="pc-face ${card.colorClass}">
            <div class="pc-face-content"><span style="font-size:2.6rem">${card.emoji}</span></div>
            <div class="pc-art-text">POSTCARD</div>
          </div>
          <div class="pc-bottom">
            <span class="pc-label">${card.label}</span>
            <div class="pc-title">${card.title}</div>
            <div class="pc-sent">${card.sent}</div>
          </div>
          <div class="pc-stamp">♡</div>
        </div>`;
      grid.appendChild(el);
      setTimeout(() => el.classList.add('visible'), 50 + i * 60 + gi * 80);
    });
    sec.appendChild(grid);
    galleryEl.appendChild(sec);
  });
}

function openLightbox(id, dir) {
  const all = dir === 'to-ann' ? POSTCARDS_TO_ANN : POSTCARDS_TO_TRI;
  const card = all.find(c => c.id === id);
  if (!card) return;

  document.getElementById('lb-face').className = 'lb-face ' + card.colorClass;
  document.getElementById('lb-face').innerHTML = `<span style="font-size:5rem">${card.emoji}</span>`;
  document.getElementById('lb-title').textContent = card.title;
  document.getElementById('lb-stamp-emoji').textContent = card.emoji;

  const msgEl = document.getElementById('lb-message');
  if (card.message) {
    msgEl.innerHTML = `<div class="lb-message-text">${card.message.replace(/\n/g,'<br>')}</div>`;
  } else {
    msgEl.innerHTML = `<div class="lb-message-placeholder">[ fill in what's written on the back of this one ♡ ]</div>`;
  }

  const addr = card.addr || [];
  ['lb-addr1','lb-addr2','lb-addr3','lb-addr4'].forEach((id, i) => {
    document.getElementById(id).textContent = addr[i] || '';
  });

  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

// Init
